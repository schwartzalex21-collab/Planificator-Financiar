    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            /* Brand Colors from style.css */
            --midnight: #0A1931;
            --midnight2: #0d2040;
            --anthracite: #2D3436;
            --forest: #1B4332;
            --emerald: #2ECC71;
            --gold: #F39C12;
            --gold-dim: #c47d0a;
            --white: #FFFFFF;
            --gray: #BDC3C7;
            --dgray: #636E72;
            --bg: #080f1e;
            --bg2: #0d1829;
            --card-bg: #0f1e35;
            --border: rgba(243, 156, 18, 0.15);
            --border-dim: rgba(255, 255, 255, 0.07);

            /* Action Colors */
            --danger: #ff4d4d;
            --warning: #ffb84d;
            --info: #4da6ff;

            /* Visuals */
            --glass-bg: rgba(8, 15, 30, 0.85);
            --blur: blur(16px);
            --font-head: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 12px;
            --radius-lg: 20px;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--white);
            min-height: 100vh;
            line-height: 1.65;
            overflow-x: hidden;
            padding-bottom: 90px;
            /* Space for bottom nav */
            /* Add delicate background grid pattern */
            background-image:
                linear-gradient(rgba(243, 156, 18, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(243, 156, 18, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: var(--font-head);
        }

        .lucide {
            width: 24px;
            height: 24px;
            stroke-width: 2;
            flex-shrink: 0;
        }

        .lucide-sm {
            width: 18px;
            height: 18px;
        }

        .lucide-lg {
            width: 32px;
            height: 32px;
            stroke-width: 1.5;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top, 0px));
            position: relative;
            min-height: 100vh;
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-dim);
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 42px;
            height: 42px;
            background: var(--midnight);
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-head);
            font-weight: 800;
            font-size: 16px;
            color: var(--gold);
            position: relative;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.2);
        }

        .logo-box::after {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid rgba(243, 156, 18, 0.3);
        }

        .brand-text h1 {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.2px;
            line-height: 1.2;
            color: var(--white);
        }

        .brand-text p {
            font-size: 11px;
            color: var(--gold);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--font-head);
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            padding: 8px 12px;
            border-radius: 100px;
            border: 1px solid var(--border-dim);
        }

        .month-btn {
            background: transparent;
            border: none;
            color: var(--gray);
            cursor: pointer;
            padding: 0 4px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .month-btn:hover {
            color: var(--gold);
        }

        .month-btn:disabled {
            color: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
        }

        .month-label {
            font-size: 13px;
            font-weight: 700;
            font-family: var(--font-head);
            min-width: 65px;
            text-align: center;
            color: var(--white);
        }

        /* Motivational Widget */
        .motivation-card {
            background: linear-gradient(145deg, var(--midnight2), var(--card-bg));
            border: 1px solid var(--border-dim);
            border-left: 3px solid var(--gold);
            padding: 14px 18px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .quote-icon {
            color: var(--gold);
            opacity: 0.8;
            margin-top: 2px;
        }

        .quote-text {
            font-size: 13px;
            color: var(--gray);
            font-style: italic;
            line-height: 1.5;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(145deg, var(--card-bg), var(--bg2));
            padding: 24px;
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(243, 156, 18, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .balance-label {
            font-size: 13px;
            color: var(--gray);
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-amount {
            font-size: 42px;
            font-weight: 800;
            font-family: var(--font-mono);
            letter-spacing: -1px;
            margin-bottom: 20px;
            color: var(--white);
        }

        /* Daily Progress */
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-safe {
            background: rgba(46, 204, 113, 0.15);
            color: var(--emerald);
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .status-warn {
            background: rgba(243, 156, 18, 0.15);
            color: var(--gold);
            border: 1px solid rgba(243, 156, 18, 0.3);
        }

        .status-danger {
            background: rgba(255, 77, 77, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 77, 77, 0.3);
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 100px;
            transition: width 0.6s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .fill-safe {
            background: linear-gradient(90deg, #27ae60, var(--emerald));
        }

        .fill-warn {
            background: linear-gradient(90deg, #d35400, var(--gold));
        }

        .fill-danger {
            background: linear-gradient(90deg, #c0392b, var(--danger));
        }

        .balance-stats {
            display: flex;
            gap: 16px;
            border-top: 1px solid var(--border-dim);
            padding-top: 16px;
            margin-top: 16px;
        }

        .stat-item {
            flex: 1;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-value.green {
            color: var(--emerald);
        }

        .stat-value.red {
            color: var(--white);
        }

        /* Keeping Red elegant, maybe white with lucide icon */

        /* Generic Cards */
        .content-section {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            font-family: var(--font-head);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--white);
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-dim);
        }

        /* Inputs & Buttons */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--gray);
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--white);
            padding: 14px 16px;
            border-radius: var(--radius);
            font-size: 16px;
            font-family: var(--font-body);
            transition: all 0.2s;
            appearance: none;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(243, 156, 18, 0.05);
        }

        /* Select Chevron via SVG data URI */
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23BDC3C7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            padding-right: 40px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px;
            border-radius: var(--radius);
            border: none;
            font-size: 15px;
            font-weight: 700;
            font-family: var(--font-head);
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .btn-primary {
            background: var(--gold);
            color: #000;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
            border: 1px solid var(--border-dim);
        }

        .btn-outline {
            background: transparent;
            color: var(--gold);
            border: 1px solid rgba(243, 156, 18, 0.4);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            width: auto;
        }

        /* List Items */
        .list-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius);
            margin-bottom: 12px;
            border: 1px solid var(--border-dim);
            transition: background 0.2s;
        }

        .list-item:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .item-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--bg2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            border: 1px solid var(--border-dim);
            color: var(--gray);
        }

        .item-details {
            flex: 1;
        }

        .item-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 2px;
            color: var(--white);
        }

        .item-subtitle {
            font-size: 12px;
            color: var(--dgray);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .item-amount {
            font-weight: 600;
            font-family: var(--font-mono);
            font-size: 16px;
            text-align: right;
            color: var(--white);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-top: 1px solid var(--border-dim);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--dgray);
            cursor: pointer;
            transition: color 0.2s;
            width: 60px;
        }

        .nav-item.active {
            color: var(--gold);
        }

        .nav-label {
            font-size: 10px;
            font-weight: 700;
            font-family: var(--font-head);
        }

        /* Floating Add Button */
        .fab {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            width: 56px;
            height: 56px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            box-shadow: 0 8px 24px rgba(243, 156, 18, 0.4);
            cursor: pointer;
            border: 4px solid var(--bg);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 101;
        }

        .fab:active {
            transform: translateX(-50%) scale(0.9);
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            animation: fadeIn 0.3s;
        }

        /* Horizontal Date Scroller */
        .date-scroller {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 12px;
            margin-bottom: 24px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .date-scroller::-webkit-scrollbar {
            display: none;
        }

        .date-scroll-obj {
            flex: 0 0 auto;
            width: 56px;
            height: 72px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-dim);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .date-scroll-obj .ds-day {
            font-size: 11px;
            color: var(--gray);
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .date-scroll-obj .ds-num {
            font-size: 20px;
            font-weight: 800;
            font-family: var(--font-mono);
            color: var(--white);
        }

        .date-scroll-obj.active {
            background: var(--gold);
            border-color: var(--gold);
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(243, 156, 18, 0.3);
        }

        .date-scroll-obj.active .ds-day,
        .date-scroll-obj.active .ds-num {
            color: #000;
        }

        .date-scroll-obj.today {
            border-color: var(--blue);
        }

        .date-scroll-obj.today:not(.active) {
            background: rgba(52, 152, 219, 0.1);
        }

        /* Help & Accordion CSS */
        .help-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
        }

        .help-header {
            padding: 16px;
            font-weight: 600;
            font-size: 15px;
            color: var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .help-body {
            padding: 0 16px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
            font-size: 14px;
            color: var(--gray);
            line-height: 1.5;
        }

        .help-body.open {
            padding: 0 16px 16px 16px;
            max-height: 500px;
        }

        /* AI Offline CSS */
        .ai-card {
            background: linear-gradient(145deg, rgba(52, 152, 219, 0.15), rgba(41, 128, 185, 0.05));
            border: 1px solid rgba(52, 152, 219, 0.3);
            border-left: 3px solid #3498DB;
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .ai-icon {
            color: #3498DB;
            background: rgba(0, 0, 0, 0.3);
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
        }

        .ai-text {
            flex: 1;
            font-size: 14px;
            color: var(--gray);
        }

        .ai-text h4 {
            font-weight: 600;
            color: var(--white);
            margin-bottom: 4px;
        }

        .allocator-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            margin-top: 8px;
            overflow: hidden;
            display: flex;
        }

        .allocator-fill {
            height: 100%;
            transition: width 0.5s ease;
        }

        /* Security & Blur */
        .app-blur {
            filter: blur(12px) grayscale(50%);
            pointer-events: none;
            user-select: none;
            transition: filter 0.3s ease;
        }

        .pin-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .pin-dots {
            display: flex;
            gap: 16px;
            margin: 40px 0;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            transition: all 0.2s;
        }

        .pin-dot.filled {
            background: var(--gold);
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.5);
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            padding: 20px;
        }

        .pin-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border-dim);
            color: var(--white);
            font-size: 28px;
            font-weight: 600;
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .pin-btn:active {
            background: rgba(243, 156, 18, 0.2);
        }

        .pin-btn.action-btn {
            background: transparent;
            border: none;
            color: var(--gold);
            font-size: 16px;
            font-family: var(--font-body);
        }

        /* Calendar */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
        }

        .calendar-day {
            padding: 8px 0;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--gray);
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .calendar-day:active {
            opacity: 0.7;
        }

        .calendar-day.active {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
            transform: scale(1.05);
        }

        .calendar-day.has-expense::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--danger);
        }

        .calendar-day.active.has-expense::after {
            background: var(--bg-dark);
        }

        .calendar-day.pad {
            background: transparent;
            cursor: default;
        }

        .modal-sheet {
            background: var(--bg);
            width: 100%;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
            animation: slideUp 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            border-top: 1px solid var(--border-dim);
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            color: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .close-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Daily Intel Card */
        .daily-intel {
            background: linear-gradient(135deg, rgba(26, 188, 156, 0.1), rgba(46, 204, 113, 0.05));
            border: 1px solid rgba(46, 204, 113, 0.2);
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .daily-intel.intel-danger {
            background: linear-gradient(135deg, rgba(255, 77, 77, 0.1), rgba(192, 57, 43, 0.05));
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        .intel-icon {
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--emerald);
        }

        .daily-intel.intel-danger .intel-icon {
            color: var(--danger);
        }

        .intel-text h4 {
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--gray);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .intel-text .amount {
            font-family: var(--font-mono);
            font-size: 24px;
            font-weight: 800;
            color: var(--white);
            line-height: 1;
        }

        /* Notification Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border-dim);
            padding: 14px 20px;
            border-radius: 50px;
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: toastEnter 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            color: var(--white);
        }

        .toast-success i {
            color: var(--emerald);
        }

        .toast-warning i {
            color: var(--warning);
        }

        .toast-info i {
            color: var(--info);
        }

        @keyframes toastEnter {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* --- PREMIUM CSS MICRO-ANIMATIONS --- */

        /* 1. Staggered List Animation */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .list-item {
            animation: slideInUp 0.4s ease-out both;
        }

        .list-item:nth-child(1) {
            animation-delay: 0.05s;
        }

        .list-item:nth-child(2) {
            animation-delay: 0.1s;
        }

        .list-item:nth-child(3) {
            animation-delay: 0.15s;
        }

        .list-item:nth-child(4) {
            animation-delay: 0.2s;
        }

        .list-item:nth-child(5) {
            animation-delay: 0.25s;
        }

        .list-item:nth-child(n+6) {
            animation-delay: 0.3s;
        }

        /* 2. Modal Slide Up & Overlay Fade */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUpModal {
            from {
                opacity: 0;
                transform: translateY(100%);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-overlay {
            animation: fadeIn 0.3s ease-out both;
        }

        .modal-sheet {
            animation: slideUpModal 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* 3. FAB Breathing Pulse */
        @keyframes breathingShadow {
            0% {
                box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3), 0 0 0 0 rgba(243, 156, 18, 0.4);
            }

            70% {
                box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3), 0 0 0 10px rgba(243, 156, 18, 0);
            }

            100% {
                box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3), 0 0 0 0 rgba(243, 156, 18, 0);
            }
        }

        .fab {
            animation: breathingShadow 3s infinite;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .fab:active {
            transform: scale(0.9);
        }

        /* 4. Tab / Page Transitions */
        .content-section {
            animation: fadeIn 0.3s ease-out both;
        }

        /* 5. AI Advisor Pulsing Focus */
        @keyframes pulseRing {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.4);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(46, 204, 113, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(46, 204, 113, 0);
            }
        }

        .intel-icon {
            animation: pulseRing 2s infinite ease-in-out;
        }

        .daily-intel.intel-danger .intel-icon {
            animation-name: none;
            /* Disable pulse on red danger */
        }

        /* 6. Success States & Confetti */
        @keyframes successGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.4);
                border-color: rgba(46, 204, 113, 0.8);
            }

            50% {
                box-shadow: 0 0 20px 0 rgba(46, 204, 113, 0.4);
                border-color: var(--emerald);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(46, 204, 113, 0);
                border-color: rgba(255, 255, 255, 0.05);
            }
        }

        .glow-success {
            animation: successGlow 1.2s ease-out both;
        }

        @keyframes checkmarkDraw {
            0% {
                stroke-dasharray: 50;
                stroke-dashoffset: 50;
                opacity: 0;
                transform: scale(0.5);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }

            100% {
                stroke-dashoffset: 0;
                transform: scale(1);
            }
        }

        .animated-check {
            stroke-dasharray: 50;
            animation: checkmarkDraw 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        @keyframes dropInScale {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(-20px);
            }

            70% {
                transform: scale(1.05) translateY(5px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .new-expense-drop {
            animation: dropInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            transform-origin: center right;
        }

        /* 7. Loading Skeletons */
        @keyframes skeletonShimmer {
            0% {
                background-position: -468px 0;
            }

            100% {
                background-position: 468px 0;
            }
        }

        .skeleton {
            background: #11213D;
            background-image: linear-gradient(to right, #11213D 0%, #1a3059 20%, #11213D 40%, #11213D 100%);
            background-repeat: no-repeat;
            background-size: 800px 104px;
            animation-duration: 1.5s;
            animation-fill-mode: forwards;
            animation-iteration-count: infinite;
            animation-name: skeletonShimmer;
            animation-timing-function: linear;
        }

        .skeleton-text {
            height: 12px;

            margin-bottom: 8px;
        }

        .skeleton-block {

            margin-bottom: 16px;
        }

        .skeleton-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

        <div
            style="padding: 20px; max-width: 600px; margin: 0 auto; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; gap: 24px; padding-top: 60px;">

    <script>
        window.addEventListener('error', function (event) {

            if (root && root.innerHTML.indexOf('Aplicația se încarcă') > -1) {

            }
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Icon Component wrapping Lucide
        const Icon = ({ name, className = "lucide", style = {} }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    // Create icon node based on name
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        iconRef.current.innerHTML = '';
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '24');
                        svg.setAttribute('height', '24');
                        svg.setAttribute('viewBox', '0 0 24 24');
                        svg.setAttribute('fill', 'none');
                        svg.setAttribute('stroke', 'currentColor');
                        svg.setAttribute('stroke-width', '2');
                        svg.setAttribute('stroke-linecap', 'round');
                        svg.setAttribute('stroke-linejoin', 'round');
                        svg.setAttribute('class', className);

                        if (Array.isArray(iconData)) {
                            iconData.forEach(child => {
                                if (Array.isArray(child) && child.length >= 2) {
                                    const el = document.createElementNS('http://www.w3.org/2000/svg', child[0]);
                                    const attrs = child[1];
                                    if (typeof attrs === 'object' && attrs !== null) {
                                        Object.keys(attrs).forEach(attr => el.setAttribute(attr, attrs[attr]));
                                    }
                                    svg.appendChild(el);
                                }
                            });
                        }
                        iconRef.current.appendChild(svg);
                    }
                }
            }, [name, className]);

            return <i ref={iconRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', ...style }}></i>;
        };

        // Categorii Premium
        const CATEGORIES_DEFAULT = [
            { id: 'supermarket', icon: 'ShoppingCart', name: 'Supermarket & Alimente' },
            { id: 'utilitati', icon: 'Lightbulb', name: 'Facturi & Utilități' },
            { id: 'chirie', icon: 'Home', name: 'Chirie & Rate' },
            { id: 'transport', icon: 'Car', name: 'Transport & Auto' },
            { id: 'sanatate', icon: 'HeartPulse', name: 'Sănătate & Farmacie' },
            { id: 'haine', icon: 'Shirt', name: 'Haine & Shopping' },
            { id: 'restaurant', icon: 'Utensils', name: 'Restaurant & Ieșiri' },
            { id: 'educatie', icon: 'GraduationCap', name: 'Educație & Cursuri' },
            { id: 'vacante', icon: 'Plane', name: 'Vacanțe & Timp Liber' },
            { id: 'copii', icon: 'Baby', name: 'Copii & Familie' },
            { id: 'economii', icon: 'PiggyBank', name: 'Economii & Investiții' },
            { id: 'altele', name: 'Altele', icon: 'MoreHorizontal', color: '#95A5A6' },
            { id: 'factura_recurenta', name: 'Factură/Rată', icon: 'Repeat', color: '#8E44AD' }
        ];

        // Bugete specifice pieței din România
        const BUDGET_TEMPLATES = [
            { name: 'Salariul Minim', income: 2400 },
            { name: 'Salariul Mediu', income: 5000 },
            { name: 'Profesionist', income: 8000 },
            { name: 'Expert / IT', income: 15000 }
        ];

        const QUOTES = [
            "Fiecare leu economisit azi e o secundă de libertate câștigată pentru mâine.",
            "Bogația nu constă în câți bani faci, ci în câți bani păstrezi.",
            "Fă ca banii tăi să muncească pentru tine, altfel tu vei munci pentru ei.",
            "Un buget îți spune unde să meargă banii tăi, în loc să te întrebi unde s-au dus.",
            "Cea mai mare bogăție este lipsa datoriilor și pacea minții."
        ];

        // Animated Number Hook for counting up effect
        const useAnimatedNumber = (endValue, duration = 800, decimals = 0) => {
            const [value, setValue] = useState(0);

            useEffect(() => {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    // easeOutQuart
                    const easeOut = 1 - Math.pow(1 - progress, 4);
                    setValue(endValue * easeOut);

                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    } else {
                        setValue(endValue);
                    }
                };
                window.requestAnimationFrame(step);
            }, [endValue, duration]);

            return Number(value.toFixed(decimals));
        };

        const SwipeableExpenseItem = ({ expense, cat, onDelete, triggerHaptic, isNew }) => {
            const [translateX, setTranslateX] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            const startXRef = useRef(0);
            const currentXRef = useRef(0);

            const handleTouchStart = (e) => {
                startXRef.current = e.touches[0].clientX;
                setIsDragging(true);
            };

            const handleTouchMove = (e) => {
                if (!isDragging) return;
                const currentX = e.touches[0].clientX;
                const diff = currentX - startXRef.current;

                if (diff < 0) {
                    currentXRef.current = diff;
                    setTranslateX(Math.max(diff, -100));
                } else {
                    currentXRef.current = 0;
                    setTranslateX(0);
                }
            };

            const handleTouchEnd = () => {
                setIsDragging(false);
                if (currentXRef.current < -60) {
                    if (triggerHaptic) triggerHaptic([50, 30, 50]);
                    setTranslateX(-500);
                    setTimeout(() => {
                        onDelete(expense.id);
                    }, 200);
                } else {
                    setTranslateX(0);
                }
            };

            return (
                <div style={{ position: 'relative', overflow: 'hidden', marginBottom: '8px', borderRadius: '16px', touchAction: 'pan-y' }}>
                    <div style={{
                        position: 'absolute', top: 0, right: 0, bottom: 0, left: 0,
                        background: 'var(--danger)', color: 'white',
                        display: 'flex', alignItems: 'center', justifyContent: 'flex-end',
                        paddingRight: '20px', borderRadius: '16px', zIndex: 0
                    }}>
                        <Icon name="Trash2" />
                    </div>

                    <div
                        className={`list-item ${isNew ? 'new-expense-drop glow-success' : ''}`}
                        style={{
                            transform: `translateX(${translateX}px)`,
                            transition: isDragging ? 'none' : 'transform 0.2s ease-out',
                            position: 'relative',
                            zIndex: 1,
                            margin: 0
                        }}
                        onTouchStart={handleTouchStart}
                        onTouchMove={handleTouchMove}
                        onTouchEnd={handleTouchEnd}
                    >
                        <div className="item-icon"><Icon name={cat.icon} /></div>
                        <div className="item-details">
                            <div className="item-title">{expense.name}</div>
                            <div className="item-subtitle">{cat.name}</div>
                        </div>
                        <div style={{ textAlign: 'right' }}>
                            <div className="item-amount">-{expense.amount} <span style={{ fontSize: '12px', color: 'var(--gray)' }}>RON</span></div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            // Core State
            const [activeTab, setActiveTab] = useState('home');
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [currentMonth, setCurrentMonth] = useState(new Date());

            // Data State
            const [income, setIncome] = useState('');
            const [expenses, setExpenses] = useState([]);
            const [subs, setSubs] = useState([]); // Subscriptions
            const [dataStore, setDataStore] = useState({});

            // Features
            const [dailyQuote, setDailyQuote] = useState('');
            const [toast, setToast] = useState(null);
            const [currentStreak, setCurrentStreak] = useState(0);
            const [openHelpIndex, setOpenHelpIndex] = useState(null);
            const [isAddSubOpen, setIsAddSubOpen] = useState(false);
            const [addedExpenseId, setAddedExpenseId] = useState(null);
            const [isAddingSuccess, setIsAddingSuccess] = useState(false);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const fileInputRef = useRef(null);

            // Cycle & Calendar
            const [payday, setPayday] = useState(1);
            const [selectedDate, setSelectedDate] = useState(new Date());

            // Security & Privacy
            const [savedPin, setSavedPin] = useState(null);
            const [isLocked, setIsLocked] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [isSettingPin, setIsSettingPin] = useState(false);
            const [tempPin, setTempPin] = useState('');
            const [isBlurred, setIsBlurred] = useState(false);

            // Notifications Note: HTML5 Notifications API require HTTPS and explicit user permissions. 
            // Since this runs offline, push notifications aren't natively reliable without a registered ServiceWorker.
            // We explain this limitation gracefully in settings.

            const getMonthKey = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
            const formatMonthInfo = (date) => {
                const months = ['Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie', 'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'];
                return `${months[date.getMonth()]} ${date.getFullYear()}`;
            };

            const showToast = (message, type = 'info') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3500);
            };

            const triggerHaptic = (pattern) => {
                try {
                    if (window.navigator && window.navigator.vibrate) {
                        window.navigator.vibrate(pattern);
                    }
                } catch (e) { }
            };

            const handleTabChange = (tab) => {
                triggerHaptic([30]);
                setActiveTab(tab);
            };

            // Initialization
            useEffect(() => {
                // Set daily quote
                setDailyQuote(QUOTES[Math.floor(Math.random() * QUOTES.length)]);

                // Security Init & Privacy Blur
                const storedPin = window.localStorage ? window.localStorage.getItem('IAI_Planner_PIN') : null;
                if (storedPin) {
                    setSavedPin(storedPin);
                    setIsLocked(true);
                }

                const storedPayday = window.localStorage ? window.localStorage.getItem('IAI_Planner_Payday') : null;
                if (storedPayday) setPayday(parseInt(storedPayday));

                const storedStreak = window.localStorage ? window.localStorage.getItem('IAI_Planner_Streak') : '0';
                const storedLastLog = window.localStorage ? window.localStorage.getItem('IAI_Planner_LastLog') : null;

                let activeStreak = parseInt(storedStreak) || 0;
                if (storedLastLog) {
                    const lastD = new Date(storedLastLog);
                    const today = new Date();
                    lastD.setHours(0, 0, 0, 0);
                    today.setHours(0, 0, 0, 0);
                    const diffTime = Math.abs(today - lastD);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    if (diffDays > 1) {
                        activeStreak = 0; // Streak broken
                        if (window.localStorage) window.localStorage.setItem('IAI_Planner_Streak', '0');
                    }
                }
                setCurrentStreak(activeStreak);

                const handleVisibilityChange = () => {
                    if (document.hidden) {
                        setIsBlurred(true);
                        // Optional: if backgrounded for more than X mins, re-lock app (setIsLocked(true) if savedPin).
                    } else {
                        setIsBlurred(false);
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                // Load local storage
                try {
                    const saved = window.localStorage ? window.localStorage.getItem('IAI_Planner_V2') : null;
                    if (saved) {
                        try {
                            const parsed = JSON.parse(saved);
                            setDataStore(parsed.dataStore || {});
                            if (parsed.subs) setSubs(parsed.subs);
                        } catch (e) {
                            console.error('Error loading data', e);
                        }
                    }
                } catch (e) {
                    console.error('LocalStorage unavailable', e);
                }

                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, []);

            // Month Data Load
            useEffect(() => {
                const mKey = getMonthKey(currentMonth);
                const monthData = dataStore[mKey] || { income: '', expenses: [] };
                setIncome(monthData.income || '');
                setExpenses(monthData.expenses || []);
            }, [currentMonth, dataStore]);

            const getCycleBounds = (date, pDay) => {
                const d = new Date(date);
                d.setHours(0, 0, 0, 0);
                let start = new Date(d.getFullYear(), d.getMonth(), pDay);
                if (d.getDate() < pDay) {
                    start = new Date(d.getFullYear(), d.getMonth() - 1, pDay);
                }
                const end = new Date(start.getFullYear(), start.getMonth() + 1, pDay - 1);
                end.setHours(23, 59, 59, 999);
                return { start, end };
            };

            const saveState = (inc, exps) => {
                const mKey = getMonthKey(currentMonth);
                const newDataStore = { ...dataStore, [mKey]: { income: inc, expenses: exps } };
                setDataStore(newDataStore);
                try {
                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        const parsed = existingSaved ? JSON.parse(existingSaved) : { subs: [] };
                        parsed.dataStore = newDataStore;
                        window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(parsed));
                    }
                } catch (e) {
                    console.error('LocalStorage save failed', e);
                }
            };

            const saveSubs = (newSubs) => {
                setSubs(newSubs);
                try {
                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        const parsed = existingSaved ? JSON.parse(existingSaved) : { dataStore: {} };
                        parsed.subs = newSubs;
                        window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(parsed));
                    }
                } catch (e) {
                    console.error('LocalStorage subs save failed', e);
                }
            };

            // Forms handling
            const [newExpenseName, setNewExpenseName] = useState('');
            const [newExpenseAmount, setNewExpenseAmount] = useState('');
            const [newExpenseCat, setNewExpenseCat] = useState('supermarket');
            const [newExpenseDate, setNewExpenseDate] = useState(''); // Allows past days

            // Voice Input Logic
            const [isListening, setIsListening] = useState(false);

            const handleVoiceInput = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    showToast('Funcția vocală nu este suportată pe acest browser.', 'error');
                    return;
                }
                const recognition = new SpeechRecognition();
                recognition.lang = 'ro-RO';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => {
                    triggerHaptic([50, 50]);
                    setIsListening(true);
                };

                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript.toLowerCase();
                    const amountMatch = speechResult.match(/\d+([.,]\d+)?/);
                    if (amountMatch) {
                        setNewExpenseAmount(amountMatch[0].replace(',', '.'));
                        let desc = speechResult.replace(amountMatch[0], '').replace(/lei|ron|bani/g, '').trim();
                        desc = desc.replace(/\b(o|un|de|pe|la)\b/g, '').trim();
                        desc = desc.replace(/\s+/g, ' ').trim();
                        setNewExpenseName(desc.charAt(0).toUpperCase() + desc.slice(1));
                        showToast(`Detectat: "${speechResult}"`, 'success');
                        triggerHaptic([30]);
                    } else {
                        showToast(`Nu am detectat suma în: "${speechResult}"`, 'warn');
                    }
                };

                recognition.onerror = () => {
                    showToast('Eroare la recunoașterea vocală.', 'error');
                    setIsListening(false);
                };

                recognition.onend = () => {
                    setIsListening(false);
                };

                recognition.start();
            };

            // --- SMART AUTOCOMPLETE ---
            useEffect(() => {
                if (newExpenseName.trim().length > 2) {
                    const searchName = newExpenseName.trim().toLowerCase();
                    // Căutare în istoricul global
                    let foundCat = null;
                    Object.values(dataStore).forEach(monthData => {
                        const exps = monthData.expenses || [];
                        const match = exps.find(e => e.name.toLowerCase() === searchName);
                        if (match && !foundCat) {
                            foundCat = match.categoryId;
                        }
                    });
                    if (foundCat) {
                        setNewExpenseCat(foundCat);
                    }
                }
            }, [newExpenseName, dataStore]);

            // --- AUTO-LOGGING RECURENȚE ---
            useEffect(() => {
                const mKey = getMonthKey(currentMonth);
                const monthData = dataStore[mKey];

                // Trage la început de lună automat dacă există venit setat și recurențe active
                if (monthData && monthData.income && subs.length > 0 && !monthData.subsAdded) {
                    let newExps = [...(monthData.expenses || [])];
                    let addedAny = false;

                    subs.forEach(sub => {
                        const alreadyExists = newExps.some(e => e.name === sub.name && e.amount === sub.amount);
                        if (!alreadyExists) {
                            newExps.push({
                                id: Date.now() + Math.random(), // Unique ID
                                name: sub.name,
                                amount: parseFloat(sub.amount),
                                categoryId: 'factura_recurenta', // Specific internal tag or just 'altele'
                                date: new Date().toISOString(),
                                isAuto: true
                            });
                            addedAny = true;
                        }
                    });

                    newExps.sort((a, b) => new Date(b.date) - new Date(a.date));

                    // Marhează luna asta ca având recurențele aplicate
                    const newDataStore = { ...dataStore, [mKey]: { ...monthData, expenses: newExps, subsAdded: true } };
                    setDataStore(newDataStore);
                    setExpenses(newExps);

                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        if (existingSaved) {
                            const parsed = JSON.parse(existingSaved);
                            parsed.dataStore = newDataStore;
                            window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(parsed));
                        }
                    }

                    if (addedAny) {
                        setTimeout(() => showToast('Costurile fixe pe luna asta au fost extrase automat!', 'info'), 1500);
                    }
                }
            }, [currentMonth, dataStore, subs]);

            const handleIncomeChange = (val) => {
                setIncome(val);
                saveState(val, expenses);
            };

            const handleAddExpense = (e) => {
                e.preventDefault();
                if (!newExpenseName || !newExpenseAmount) {
                    showToast('Completează ambele câmpuri!', 'warning');
                    return;
                }

                const amount = parseFloat(newExpenseAmount);

                // Fix: JS .toISOString() uses UTC. Late night inputs (e.g. 11 PM GMT+2) shift to the next day.
                // We must construct an ISO string from LOCAL time to strictly match the scroller logic.
                let activeDateObj = newExpenseDate ? new Date(newExpenseDate) : new Date();
                const tzOffset = activeDateObj.getTimezoneOffset() * 60000;
                const localISOTime = (new Date(activeDateObj - tzOffset)).toISOString().slice(0, -1);
                const activeDateString = localISOTime;

                const expenseItem = {
                    id: Date.now(),
                    name: newExpenseName,
                    amount: amount,
                    categoryId: newExpenseCat,
                    date: activeDateString,
                    isManualDate: !!newExpenseDate
                };

                const targetMKey = getMonthKey(new Date(activeDateString));

                if (targetMKey === getMonthKey(currentMonth)) {
                    const updatedList = [expenseItem, ...expenses];
                    setExpenses(updatedList);
                    saveState(income, updatedList);
                } else {
                    const targetMonthData = dataStore[targetMKey] || { income: '', expenses: [] };
                    const updatedTargetExps = [expenseItem, ...(targetMonthData.expenses || [])];
                    const newDataStore = { ...dataStore, [targetMKey]: { ...targetMonthData, expenses: updatedTargetExps } };
                    setDataStore(newDataStore);
                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        const parsed = existingSaved ? JSON.parse(existingSaved) : { subs: [], dataStore: {} }; // Ensure dataStore exists
                        parsed.dataStore = newDataStore;
                        window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(parsed));
                    }
                }

                setNewExpenseName('');
                setNewExpenseAmount('');
                setNewExpenseCat('supermarket');
                setNewExpenseDate('');

                // Phase 8 WOW: Trigger Success Animations
                setIsAddingSuccess(true);
                triggerHaptic([100, 50, 100]); // Strong haptic validation
                setAddedExpenseId(expenseItem.id);

                setTimeout(() => {
                    setIsAddingSuccess(false);
                    setIsAddModalOpen(false);
                    setTimeout(() => setAddedExpenseId(null), 1200); // Let the CSS glow fade out on the item naturally
                }, 1000); // 1s Checkmark visibility

                // Update Gamification Streak
                const todayStr = new Date().toDateString();
                const savedLastLog = window.localStorage ? window.localStorage.getItem('IAI_Planner_LastLog') : null;
                if (savedLastLog !== todayStr) {
                    const newStreak = currentStreak + 1;
                    setCurrentStreak(newStreak);
                    if (window.localStorage) {
                        window.localStorage.setItem('IAI_Planner_LastLog', todayStr);
                        window.localStorage.setItem('IAI_Planner_Streak', newStreak.toString());
                    }
                }
            };

            const [newSubName, setNewSubName] = useState('');
            const [newSubAmount, setNewSubAmount] = useState('');

            const handleAddSub = (e) => {
                e.preventDefault();
                if (!newSubName || !newSubAmount) return;

                const amount = parseFloat(newSubAmount);
                const subItem = {
                    id: Date.now(),
                    name: newSubName,
                    amount: amount
                };

                const updatedList = [...subs, subItem];
                saveSubs(updatedList);

                setNewSubName('');
                setNewSubAmount('');
                setIsAddSubOpen(false);
                showToast('Abonament setat cu succes!', 'success');
            };

            const deleteExpense = (id) => {
                const updatedList = expenses.filter(e => e.id !== id);
                setExpenses(updatedList);
                saveState(income, updatedList);
                showToast('Cheltuială ștearsă!', 'info');
                triggerHaptic([50, 30, 50]); // Feedback dublu pt ștergere
            };

            // Math Logic
            const totalIncome = parseFloat(income || 0);
            const totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
            const remaining = totalIncome - totalExpenses;
            let spendPercentage = 0;
            if (totalIncome > 0) {
                spendPercentage = Math.min((totalExpenses / totalIncome) * 100, 100);
            }

            // Health Logic
            let healthStatus = { msg: "Balanță Zen", class: "status-safe", fill: "fill-safe", icon: "Smile" };
            if (spendPercentage >= 90) {
                healthStatus = { msg: "Critic", class: "status-danger", fill: "fill-danger", icon: "AlertTriangle" };
            } else if (spendPercentage >= 75) {
                healthStatus = { msg: "Atenție", class: "status-warn", fill: "fill-warn", icon: "AlertCircle" };
            }

            // Daily Allowance Intel Engine
            const today = new Date();
            const isCurrentMonth = currentMonth.getMonth() === today.getMonth() && currentMonth.getFullYear() === today.getFullYear();

            const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate();
            const daysPassed = isCurrentMonth ? today.getDate() : daysInMonth;
            const daysLeft = isCurrentMonth ? (daysInMonth - daysPassed + 1) : 0;

            const allowancePerDay = daysLeft > 0 && remaining > 0 ? (remaining / daysLeft).toFixed(0) : 0;

            // Financial Allocator (50/30/20)
            const needsCat = ['supermarket', 'utilitati', 'chirie', 'transport', 'sanatate', 'educatie', 'copii'];
            const wantsCat = ['haine', 'restaurant', 'vacante', 'vicii', 'altele'];
            const savingsCat = ['economii'];

            const spentNeeds = expenses.filter(e => needsCat.includes(e.categoryId)).reduce((sum, e) => sum + e.amount, 0);
            const spentWants = expenses.filter(e => wantsCat.includes(e.categoryId)).reduce((sum, e) => sum + e.amount, 0);
            const spentSavings = expenses.filter(e => savingsCat.includes(e.categoryId)).reduce((sum, e) => sum + e.amount, 0);

            const targetNeeds = totalIncome * 0.50;
            const targetWants = totalIncome * 0.30;
            const targetSavings = totalIncome * 0.20;

            const pctNeeds = totalIncome > 0 ? Math.min((spentNeeds / targetNeeds) * 100, 100) : 0;
            const pctWants = totalIncome > 0 ? Math.min((spentWants / targetWants) * 100, 100) : 0;
            const pctSavings = totalIncome > 0 ? Math.min((spentSavings / targetSavings) * 100, 100) : 0;

            // Global Savings for Gamification (Rank & Level)
            let globalSavings = 0;
            Object.values(dataStore).forEach(monthData => {
                const mExps = monthData.expenses || [];
                globalSavings += mExps.filter(e => e.categoryId === 'economii').reduce((s, e) => s + e.amount, 0);
            });

            let userRankName = "Începător Banii";
            let userRankIcon = "Baby";
            let userRankColor = "#7f8c8d";
            if (globalSavings >= 100) { userRankName = "Novice Financiar"; userRankIcon = "Coins"; userRankColor = "#3498DB"; }
            if (globalSavings >= 1000) { userRankName = "Investitor Inteligent"; userRankIcon = "TrendingUp"; userRankColor = "#2ECC71"; }
            if (globalSavings >= 5000) { userRankName = "Milionar în Devenire"; userRankIcon = "Gem"; userRankColor = "#F39C12"; }
            if (globalSavings >= 20000) { userRankName = "Maestru IAI"; userRankIcon = "Crown"; userRankColor = "#9B59B6"; }

            // AI Offline Insights Generator & Allocation Engine
            let aiMessage = "Balanța ta arată bine! Adaugă cheltuieli pentru a primi analize avansate din partea IAI.";
            let aiIcon = "Cpu";
            let recommendedSavings = 0;
            let recommendedInvestments = 0;
            let recommendedBuffer = 0;

            if (totalIncome > 0) {
                const totalFixed = subs.reduce((sum, s) => sum + s.amount, 0);
                // "totalExpenses" variable already includes what was actually spent this month
                const cashRemaining = totalIncome - totalFixed - totalExpenses;

                if (cashRemaining > 0) {
                    // Logic requested by user: "how much to put aside for savings, investments, etc."
                    recommendedSavings = cashRemaining * 0.40; // 40% into emergency/short term
                    recommendedInvestments = cashRemaining * 0.40; // 40% into stocks/long term
                    recommendedBuffer = cashRemaining * 0.20; // 20% keep in account for buffer

                    aiMessage = `Din salariul tău, ai cheltuit și blocat în facturi **${(totalFixed + totalExpenses).toFixed(0)} RON**. Din cei **${cashRemaining.toFixed(0)} RON** rămași pe luna aceasta, IAI îți recomandă să îi distribui inteligent pentru a genera avere.`;
                    aiIcon = "TrendingUp";
                } else {
                    aiMessage = `Ești pe minus sau pe zero cu bugetul lunar ({cashRemaining.toFixed(0)} RON rămași). IAI recomandă tăierea cheltuielilor neesențiale urgent!`;
                    aiIcon = "AlertTriangle";
                }
            }

            // Chart rendering
            useEffect(() => {
                if (activeTab === 'analytics' && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    if (chartInstance.current) chartInstance.current.destroy();

                    const byCat = {};
                    expenses.forEach(e => {
                        const c = CATEGORIES_DEFAULT.find(cat => cat.id === e.categoryId);
                        const name = c ? c.name : 'Altele';
                        byCat[name] = (byCat[name] || 0) + e.amount;
                    });

                    const labels = Object.keys(byCat);
                    const data = Object.values(byCat);

                    if (labels.length > 0) {
                        Chart.defaults.color = '#BDC3C7';
                        chartInstance.current = new Chart(ctx, {
                            type: 'doughnut',
                            data: {
                                labels: labels,
                                datasets: [{
                                    data: data,
                                    backgroundColor: ['#F39C12', '#2ECC71', '#3498DB', '#E74C3C', '#9B59B6', '#1ABC9C', '#F1C40F', '#E67E22'],
                                    borderWidth: 0,
                                    hoverOffset: 4
                                }]

                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                cutout: '75%',
                                plugins: { legend: { position: 'right', labels: { font: { family: 'Plus Jakarta Sans', size: 12 } } } }
                            }
