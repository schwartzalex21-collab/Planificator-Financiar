                    }
                }
            }, [activeTab, expenses]);

            const toggleHelp = (index) => {
                setOpenHelpIndex(prevIndex => prevIndex === index ? null : index);
            };

            // --- SECURITY AND DATA BACKUP ACTIONS ---
            const handlePinPress = (digit) => {
                if (pinInput.length < 4) {
                    const newPin = pinInput + digit;
                    setPinInput(newPin);

                    if (newPin.length === 4) {
                        setTimeout(() => {
                            if (isSettingPin) {
                                if (!tempPin) {
                                    setTempPin(newPin);
                                    setPinInput('');
                                    showToast('Confirmă noul cod PIN', 'info');
                                } else {
                                    if (newPin === tempPin) {
                                        window.localStorage.setItem('IAI_Planner_PIN', newPin);
                                        setSavedPin(newPin);
                                        setIsSettingPin(false);
                                        setTempPin('');
                                        setPinInput('');
                                        showToast('Cod PIN securizat cu succes!', 'success');
                                    } else {
                                        showToast('Codurile nu coincid! Încearcă din nou.', 'danger');
                                        setTempPin('');
                                        setPinInput('');
                                    }
                                }
                            } else {
                                if (newPin === savedPin) {
                                    setIsLocked(false);
                                    setPinInput('');
                                } else {
                                    showToast('PIN Incorect!', 'danger');
                                    setPinInput('');
                                }
                            }
                        }, 250);
                    }
                }
            };

            const removePin = () => {
                if (confirm('Sigur vrei să elimini protecția cu cod PIN?')) {
                    window.localStorage.removeItem('IAI_Planner_PIN');
                    setSavedPin(null);
                    showToast('Cod PIN eliminat.', 'info');
                }
            };

            const handleExportJson = () => {
                try {
                    const data = window.localStorage.getItem('IAI_Planner_V2');
                    if (!data) return showToast('Nu există date pentru export.', 'warning');

                    const blob = new Blob([data], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `MoneyPlanner_Backup_${new Date().toISOString().split('T')[0]}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast('Backup salvat cu succes!', 'success');
                } catch (e) {
                    showToast('Eroare la exportul datelor.', 'danger');
                }
            };

            const handleImportJson = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const content = event.target.result;
                        JSON.parse(content); // Validare JSON
                        window.localStorage.setItem('IAI_Planner_V2', content);
                        showToast('Restaurare reușită! Se reîncarcă datele...', 'success');
                        setTimeout(() => window.location.reload(), 1500);
                    } catch (err) {
                        showToast('Fișier invalid sau corupt!', 'danger');
                    }
                };
                reader.readAsText(file);
                // Reset file input
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            // CALENDAR VARS & HOISTED LOGIC
            const { start: cycleStart, end: cycleEnd } = getCycleBounds(selectedDate, payday);
            const mKey1 = getMonthKey(cycleStart);
            const mKey2 = getMonthKey(cycleEnd);

            let cycleExps = [];
            if (dataStore[mKey1]?.expenses) cycleExps.push(...dataStore[mKey1].expenses);
            if (mKey1 !== mKey2 && dataStore[mKey2]?.expenses) cycleExps.push(...dataStore[mKey2].expenses);
            cycleExps = cycleExps.filter(e => new Date(e.date) >= cycleStart && new Date(e.date) <= cycleEnd);

            const selectedStr = selectedDate.toISOString().split('T')[0];
            const dayExps = cycleExps.filter(e => e.date.startsWith(selectedStr));
            const dayTotal = dayExps.reduce((s, e) => s + e.amount, 0);

            const spentBefore = cycleExps.filter(e => new Date(e.date) >= cycleStart && new Date(e.date) < new Date(selectedDate).setHours(0, 0, 0, 0)).reduce((s, e) => s + e.amount, 0);
            const cycleIncome = parseFloat(dataStore[mKey1]?.income || 0);
            const totalFixed = subs.reduce((s, x) => s + x.amount, 0);
            const budgetAtStartOfDay = cycleIncome - totalFixed - spentBefore;

            const daysLeftInCycle = Math.ceil((cycleEnd - new Date(selectedDate).setHours(0, 0, 0, 0)) / (1000 * 60 * 60 * 24));

            let activeDailyBudget = 0;
            if (daysLeftInCycle > 0) {
                activeDailyBudget = parseFloat((budgetAtStartOfDay / daysLeftInCycle).toFixed(0));
            }

            const cycleDaysArr = [];
            let currD = new Date(cycleStart);
            while (currD <= cycleEnd) {
                cycleDaysArr.push(new Date(currD));
                currD.setDate(currD.getDate() + 1);
            }

            // Phase 8: Animated Numbers
            const animRemaining = useAnimatedNumber(remaining);
            const animTotalExpenses = useAnimatedNumber(totalExpenses);
            const animGlobalSavings = useAnimatedNumber(globalSavings);
            const animActiveDailyBudget = useAnimatedNumber(activeDailyBudget);
            const animDayTotal = useAnimatedNumber(dayTotal);
            const animDailyRemaining = useAnimatedNumber(activeDailyBudget - dayTotal);

            // PIN screen override
            if (isLocked || isSettingPin) {
                return (
                    <div className="pin-screen">
                        {toast && <div className={`toast toast-${toast.type}`} style={{ top: '40px' }}>{toast.message}</div>}
                        <Icon name={isSettingPin ? "ShieldPlus" : "Lock"} className="lucide-xl" style={{ color: 'var(--gold)', marginBottom: '24px', width: '48px', height: '48px' }} />
                        <h2 style={{ color: 'var(--white)', fontSize: '24px', fontWeight: 'bold' }}>Money Planner</h2>
                        <p style={{ color: 'var(--gray)', marginTop: '8px' }}>
                            {isSettingPin ? (tempPin ? 'Confirmă noul PIN' : 'Crează un cod PIN de 4 cifre') : 'Introduceți codul PIN de siguranță'}
                        </p>

                        <div className="pin-dots">
                            {[0, 1, 2, 3].map(i => (
                                <div key={i} className={`pin-dot ${pinInput.length > i ? 'filled' : ''}`}></div>
                            ))}
                        </div>

                        <div className="pin-pad">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                                <button key={num} className="pin-btn" onClick={() => handlePinPress(num.toString())}>{num}</button>
                            ))}
                            {isSettingPin ? (
                                <button className="pin-btn action-btn" onClick={() => { setIsSettingPin(false); setPinInput(''); setTempPin(''); }}>Anul.<br />Setare</button>
                            ) : <div></div>}
                            <button className="pin-btn" onClick={() => handlePinPress('0')}>0</button>
                            <button className="pin-btn action-btn" onClick={() => setPinInput(pinInput.slice(0, -1))}><Icon name="Delete" /></button>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`app-container ${isBlurred ? 'app-blur' : ''}`}>
                    {/* Toasts */}
                    {toast && (
                        <div className={`toast toast-${toast.type}`}>
                            {toast.type === 'success' && <Icon name="CheckCircle2" />}
                            {toast.type === 'warning' && <Icon name="AlertTriangle" />}
                            {toast.type === 'info' && <Icon name="Info" />}
                            {toast.message}
                        </div>
                    )}

                    {/* Header */}
                    <div className="header">
                        <div className="brand-section">
                            <div className="logo-box">IAI</div>
                            <div className="brand-text">
                                <p>Inginerul cu AI</p>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                    <h1 style={{ margin: 0 }}>Bugetul Personal</h1>
                                    <div style={{
                                        background: currentStreak > 0 ? 'rgba(243, 156, 18, 0.15)' : 'rgba(255,255,255,0.05)',
                                        color: currentStreak > 0 ? 'var(--gold)' : 'var(--dgray)',
                                        padding: '2px 8px',
                                        borderRadius: '12px',
                                        fontSize: '11px',
                                        fontWeight: 'bold',
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '4px',
                                        transition: 'all 0.3s ease'
                                    }}>
                                        <Icon name="Flame" className="lucide-sm" style={{ width: '12px', height: '12px' }} />
                                        {currentStreak} {currentStreak === 1 ? 'zi' : 'zile'}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="month-selector">
                            <button className="month-btn" onClick={() => {
                                const n = new Date(currentMonth); n.setMonth(n.getMonth() - 1); setCurrentMonth(n);
                            }}><Icon name="ChevronLeft" className="lucide-sm" /></button>

                            <span className="month-label" style={{ textTransform: 'capitalize' }}>
                                {formatMonthInfo(currentMonth).split(' ')[0].substring(0, 3)} '{String(currentMonth.getFullYear()).substring(2)}
                            </span>

                            <button className="month-btn" onClick={() => {
                                const n = new Date(currentMonth); n.setMonth(n.getMonth() + 1); setCurrentMonth(n);
                            }} disabled={currentMonth >= today && currentMonth.getMonth() >= today.getMonth()}><Icon name="ChevronRight" className="lucide-sm" /></button>
                        </div>
                    </div>

                    {/* Navigation Logic */}
                    {activeTab === 'home' && (
                        <div className="content-section">
                            {/* Salary Configuration & Overall Monthly Balance */}
                            <div className="balance-card">
                                <div className="progress-header">
                                    <span className="balance-label">Balanță Lunară Rămasă</span>
                                    {totalIncome > 0 && remaining > 0 && (
                                        <div className="status-badge good">
                                            <Icon name="TrendingUp" className="lucide-sm" />
                                            Pozitiv
                                        </div>
                                    )}
                                </div>
                                <div className="balance-amount">
                                    {animRemaining} <span style={{ fontSize: '20px', color: 'var(--gray)' }}>RON</span>
                                </div>
                                <div className="progress-bar-container">
                                    <div className="progress-bar" style={{ width: `${spendPercentage}%`, background: `var(--${healthStatus.fill.split('-')[1]})` }}></div>
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '8px', fontSize: '12px', color: 'var(--gray)' }}>
                                    <span>Cheltuit: {animTotalExpenses}</span>
                                    <span style={{ color: `var(--${healthStatus.fill.split('-')[1]})` }}>{spendPercentage.toFixed(1)}%</span>
                                </div>
                            </div>

                            <div className="section-title">Ajustează Venitul (Lunar)</div>
                            <div className="card">
                                <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '16px' }}>
                                    <div className="item-icon" style={{ background: 'rgba(243, 156, 18, 0.1)', color: 'var(--gold)' }}>
                                        <Icon name="Wallet" />
                                    </div>
                                    <input
                                        type="number"
                                        placeholder="Introdu suma..."
                                        value={income}
                                        onChange={(e) => handleIncomeChange(e.target.value)}
                                        style={{ background: 'transparent', border: 'none', color: 'var(--white)', fontSize: '24px', fontWeight: 'bold', width: '100%', outline: 'none' }}
                                    />
                                    <span style={{ color: 'var(--gray)', fontWeight: 'bold' }}>RON</span>

                                    <button className="btn-outline" style={{ fontSize: '11px', padding: '6px 10px', whiteSpace: 'nowrap' }} onClick={() => handleIncomeChange('5000')}>Mediu</button>

                                <button className="btn-primary" style={{ marginTop: '16px', background: 'rgba(52, 152, 219, 0.1)', color: '#3498DB', border: '1px solid rgba(52, 152, 219, 0.3)' }} onClick={() => setShowBillModal(true)}>

                    {activeTab === 'calendar' && (

                                    return (
                                        <div key={i}

                                            onClick={() => setSelectedDate(d)}>

                                            <div className="ds-num">{d.getDate()}</div>
                                        </div>

                            <div className="modal-sheet">
                                <div className="modal-header">
                                    <h2 style={{ fontSize: '20px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <Icon name="CalendarClock" style={{ color: 'var(--gold)' }} />
                                        Abonament Nou
                                    </h2>
                                    <button className="close-btn" onClick={() => setIsAddSubOpen(false)}>
                                        <Icon name="X" />
                                    </button>
                                </div>

                                <form onSubmit={handleAddSub}>
                                    <div className="form-group" style={{ position: 'relative' }}>
                                        <input
                                            type="number"
                                            step="0.01"
                                            placeholder="0.00"
                                            value={newSubAmount}
                                            onChange={e => setNewSubAmount(e.target.value)}
                                            required
                                            style={{ fontSize: '32px', fontWeight: '800', fontFamily: 'var(--font-mono)' }}
                                            autoFocus
                                        />
                                    </div>

                                    <div className="form-group" style={{ marginTop: '20px' }}>
                                        <label>Nume Factură / Abonament</label>
                                        <input
                                            type="text"
                                            placeholder="Ex: Netflix, Chirie, Rată Bancă..."
                                            value={newSubName}
                                            onChange={e => setNewSubName(e.target.value)}
                                            required
                                        />
                                    </div>

                                    <div className="form-group" style={{ marginTop: '24px' }}>
                                        <button type="submit" className="btn btn-primary" style={{ width: '100%', padding: '18px' }}>
                                            <Icon name="Check" />
                                            Salvează Recurența
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error("React Error Caught:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '40px 20px', textAlign: 'center', color: 'white', fontFamily: 'sans-serif', height: '100vh', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center' }}>
                            <div style={{ fontSize: '48px', fontWeight: 'bold', color: '#ff4d4d', marginBottom: '20px' }}>Eroare Interfață</div>
                            <h2 style={{ marginBottom: '10px' }}>A apărut o eroare neașteptată pe acest dispozitiv.</h2>
                            <p style={{ color: '#BDC3C7', fontSize: '14px', maxWidth: '320px', marginTop: '10px', background: 'rgba(0,0,0,0.5)', padding: '15px', borderRadius: '8px', fontFamily: 'monospace', textAlign: 'left', wordBreak: 'break-all' }}>
                                {this.state.error?.toString()}
                            </p>
                            <button onClick={() => window.location.reload()} style={{ marginTop: '30px', background: '#F39C12', color: 'black', border: 'none', padding: '12px 24px', borderRadius: '50px', fontWeight: 'bold', fontSize: '16px' }}>Reîncarcă Aplicația</button>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>

</html>
