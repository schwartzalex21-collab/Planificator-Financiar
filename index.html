    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            /* Brand Colors */
            --midnight: #0A1931;
            --midnight2: #0d2040;
            --anthracite: #2D3436;
            --forest: #1B4332;
            --emerald: #2ECC71;
            --gold: #F39C12;
            --gold-dim: #c47d0a;
            --white: #FFFFFF;
            --gray: #BDC3C7;
            --dgray: #636E72;
            --bg: #060d1a;
            --bg2: #0d1829;
            --card-bg: #0f1e35;
            --border: rgba(243, 156, 18, 0.15);
            --border-dim: rgba(255, 255, 255, 0.07);

            /* Action Colors */
            --danger: #ff4d4d;
            --warning: #ffb84d;
            --info: #4da6ff;
            --blue: #3498DB;
            --purple: #9B59B6;
            --teal: #1abc9c;

            /* Visuals */
            --glass-bg: rgba(6, 13, 26, 0.88);
            --card-glass: rgba(15, 30, 53, 0.7);
            --blur: blur(20px);
            --blur-sm: blur(10px);
            --font-head: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 14px;
            --radius-lg: 22px;
            --radius-xl: 30px;
            --shadow-gold: 0 8px 32px rgba(243, 156, 18, 0.25);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--white);
            min-height: 100vh;
            line-height: 1.65;
            overflow-x: hidden;
            padding-bottom: 100px;
            /* Premium radial gradient + grid */
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(243, 156, 18, 0.08) 0%, transparent 60%),
                linear-gradient(rgba(243, 156, 18, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(243, 156, 18, 0.025) 1px, transparent 1px);
            background-size: auto, 40px 40px, 40px 40px;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: var(--font-head);
        }

        .lucide {
            width: 24px;
            height: 24px;
            stroke-width: 2;
            flex-shrink: 0;
        }

        .lucide-sm {
            width: 18px;
            height: 18px;
        }

        .lucide-lg {
            width: 32px;
            height: 32px;
            stroke-width: 1.5;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top, 0px));
            position: relative;
            min-height: 100vh;
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-dim);
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 42px;
            height: 42px;
            background: var(--midnight);
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-head);
            font-weight: 800;
            font-size: 16px;
            color: var(--gold);
            position: relative;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.2);
        }

        .logo-box::after {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid rgba(243, 156, 18, 0.3);
        }

        .brand-text h1 {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.2px;
            line-height: 1.2;
            color: var(--white);
        }

        .brand-text p {
            font-size: 11px;
            color: var(--gold);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--font-head);
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding-bottom: 4px;
            mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }

        .month-selector::-webkit-scrollbar {
            display: none;
        }

        .month-pill {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid var(--border-dim);
            color: var(--gray);
            font-size: 13px;
            font-weight: 700;
            font-family: var(--font-head);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .month-pill.active {
            background: rgba(243, 156, 18, 0.15);
            color: var(--gold);
            border-color: rgba(243, 156, 18, 0.4);
        }

        /* Motivational Widget */
        .motivation-card {
            background: linear-gradient(145deg, var(--midnight2), var(--card-bg));
            border: 1px solid var(--border-dim);
            border-left: 3px solid var(--gold);
            padding: 14px 18px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .quote-icon {
            color: var(--gold);
            opacity: 0.8;
            margin-top: 2px;
        }

        .quote-text {
            font-size: 13px;
            color: var(--gray);
            font-style: italic;
            line-height: 1.5;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(145deg, var(--card-bg), var(--bg2));
            padding: 24px;
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(243, 156, 18, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .balance-label {
            font-size: 13px;
            color: var(--gray);
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-amount {
            font-size: 42px;
            font-weight: 800;
            font-family: var(--font-mono);
            letter-spacing: -1px;
            margin-bottom: 20px;
            color: var(--white);
        }

        /* Daily Progress */
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-safe {
            background: rgba(46, 204, 113, 0.15);
            color: var(--emerald);
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .status-warn {
            background: rgba(243, 156, 18, 0.15);
            color: var(--gold);
            border: 1px solid rgba(243, 156, 18, 0.3);
        }

        .status-danger {
            background: rgba(255, 77, 77, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 77, 77, 0.3);
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 100px;
            transition: width 0.6s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .fill-safe {
            background: linear-gradient(90deg, #27ae60, var(--emerald));
        }

        .fill-warn {
            background: linear-gradient(90deg, #d35400, var(--gold));
        }

        .fill-danger {
            background: linear-gradient(90deg, #c0392b, var(--danger));
        }

        .balance-stats {
            display: flex;
            gap: 16px;
            border-top: 1px solid var(--border-dim);
            padding-top: 16px;
            margin-top: 16px;
        }

        .stat-item {
            flex: 1;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-value.green {
            color: var(--emerald);
        }

        .stat-value.red {
            color: var(--white);
        }

        /* Keeping Red elegant, maybe white with lucide icon */

        /* Generic Cards */
        .content-section {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            font-family: var(--font-head);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--white);
        }

        /* Hero Dashboard UI */
        .hero-dashboard {
            background: linear-gradient(135deg, var(--midnight), var(--midnight2));
            margin: -20px -20px 40px -20px;
            padding: 30px 20px 50px 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            position: relative;
            text-align: center;
            border-bottom: 1px solid var(--border-dim);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s ease-out;
        }

        .hero-dashboard .balance-label {
            color: var(--gray);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .hero-dashboard .balance-amount {
            font-size: 42px;
            font-weight: 900;
            font-family: var(--font-mono);
            color: var(--white);
            line-height: 1;
        }

        .hero-cards-wrapper {
            position: absolute;
            bottom: -30px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .hero-card {
            flex: 1;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border-dim);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hero-card.income .hero-icon {
            background: rgba(46, 204, 113, 0.15);
            color: var(--emerald);
        }

        .hero-card.expense .hero-icon {
            background: rgba(255, 77, 77, 0.15);
            color: var(--danger);
        }

        .hero-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-card-details h5 {
            font-size: 11px;
            color: var(--gray);
            font-weight: 600;
            margin-bottom: 2px;
        }

        .hero-card-details p {
            font-size: 16px;
            font-weight: 800;
            font-family: var(--font-mono);
            color: var(--white);
        }

        .card {
            background: var(--card-glass);
            backdrop-filter: var(--blur-sm);
            -webkit-backdrop-filter: var(--blur-sm);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-dim);
            box-shadow: var(--shadow-card);
        }

        /* Inputs & Buttons */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--gray);
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--white);
            padding: 14px 16px;
            border-radius: var(--radius);
            font-size: 16px;
            font-family: var(--font-body);
            transition: all 0.2s;
            appearance: none;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(243, 156, 18, 0.05);
        }

        /* Select Chevron via SVG data URI */
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23BDC3C7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            padding-right: 40px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px;
            border-radius: var(--radius);
            border: none;
            font-size: 15px;
            font-weight: 700;
            font-family: var(--font-head);
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .btn-primary {
            background: var(--gold);
            color: #000;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
            border: 1px solid var(--border-dim);
        }

        .btn-outline {
            background: transparent;
            color: var(--gold);
            border: 1px solid rgba(243, 156, 18, 0.4);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            width: auto;
        }

        /* List Items */
        .list-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius);
            margin-bottom: 12px;
            border: 1px solid var(--border-dim);
            transition: background 0.2s;
        }

        .list-item:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .item-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--bg2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            border: 1px solid var(--border-dim);
            color: var(--gray);
        }

        .item-details {
            flex: 1;
        }

        .item-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 2px;
            color: var(--white);
        }

        .item-subtitle {
            font-size: 12px;
            color: var(--dgray);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .item-amount {
            font-weight: 600;
            font-family: var(--font-mono);
            font-size: 16px;
            text-align: right;
            color: var(--white);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 16px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
            background: rgba(6, 13, 26, 0.92);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            border-top: 1px solid rgba(243, 156, 18, 0.12);
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.5);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: var(--dgray);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 60px;
            padding: 6px 0;
            border-radius: 12px;
            position: relative;
        }

        .nav-item.active {
            color: var(--gold);
            transform: translateY(-2px);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            bottom: 2px;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(243, 156, 18, 0.8);
        }

        .nav-label {
            font-size: 10px;
            font-weight: 700;
            font-family: var(--font-head);
            transition: opacity 0.2s;
        }

        .nav-item:not(.active) .nav-label {
            opacity: 0.6;
        }

        /* Floating Add Button */
        .fab-wrapper {
            position: relative;
            top: -20px;
            width: 60px;
            display: flex;
            justify-content: center;
        }

        .fab {
            width: 56px;
            height: 56px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            box-shadow: 0 8px 24px rgba(243, 156, 18, 0.4);
            cursor: pointer;
            border: 4px solid var(--bg);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 101;
        }

        .fab:active {
            transform: scale(0.9);
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            animation: fadeIn 0.3s;
        }

        /* Horizontal Date Scroller */
        .date-scroller {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 12px;
            margin-bottom: 24px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .date-scroller::-webkit-scrollbar {
            display: none;
        }

        .date-scroll-obj {
            flex: 0 0 auto;
            width: 56px;
            height: 72px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-dim);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .date-scroll-obj .ds-day {
            font-size: 11px;
            color: var(--gray);
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .date-scroll-obj .ds-num {
            font-size: 20px;
            font-weight: 800;
            font-family: var(--font-mono);
            color: var(--white);
        }

        .date-scroll-obj.active {
            background: var(--gold);
            border-color: var(--gold);
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(243, 156, 18, 0.3);
        }

        .date-scroll-obj.active .ds-day,
        .date-scroll-obj.active .ds-num {
            color: #000;
        }

        .date-scroll-obj.today {
            border-color: var(--blue);
        }

        .date-scroll-obj.today:not(.active) {
            background: rgba(52, 152, 219, 0.1);
        }

        /* Help & Accordion CSS */
        .help-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
        }

        .help-header {
            padding: 16px;
            font-weight: 600;
            font-size: 15px;
            color: var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .help-body {
            padding: 0 16px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
            font-size: 14px;
            color: var(--gray);
            line-height: 1.5;
        }

        .help-body.open {
            padding: 0 16px 16px 16px;
            max-height: 500px;
        }

        /* AI Offline CSS */
        .ai-card {
            background: linear-gradient(145deg, rgba(52, 152, 219, 0.15), rgba(41, 128, 185, 0.05));
            border: 1px solid rgba(52, 152, 219, 0.3);
            border-left: 3px solid #3498DB;
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .ai-icon {
            color: #3498DB;
            background: rgba(0, 0, 0, 0.3);
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
        }

        .ai-text {
            flex: 1;
            font-size: 14px;
            color: var(--gray);
        }

        .ai-text h4 {
            font-weight: 600;
            color: var(--white);
            margin-bottom: 4px;
        }

        .allocator-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            margin-top: 8px;
            overflow: hidden;
            display: flex;
        }

        .allocator-fill {
            height: 100%;
            transition: width 0.5s ease;
        }

        /* Security & Blur */
        .app-blur {
            filter: blur(12px) grayscale(50%);
            pointer-events: none;
            user-select: none;
            transition: filter 0.3s ease;
        }

        .pin-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .pin-dots {
            display: flex;
            gap: 16px;
            margin: 40px 0;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            transition: all 0.2s;
        }

        .pin-dot.filled {
            background: var(--gold);
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.5);
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            padding: 20px;
        }

        .pin-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border-dim);
            color: var(--white);
            font-size: 28px;
            font-weight: 600;
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .pin-btn:active {
            background: rgba(243, 156, 18, 0.2);
        }

        .pin-btn.action-btn {
            background: transparent;
            border: none;
            color: var(--gold);
            font-size: 16px;
            font-family: var(--font-body);
        }

        /* Calendar */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
        }

        .calendar-day {
            padding: 8px 0;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--gray);
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .calendar-day:active {
            opacity: 0.7;
        }

        .calendar-day.active {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
            transform: scale(1.05);
        }

        .calendar-day.has-expense::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--danger);
        }

        .calendar-day.active.has-expense::after {
            background: var(--bg-dark);
        }

        .calendar-day.pad {
            background: transparent;
            cursor: default;
        }

        /* Modal Sheet — stays above keyboard on mobile */
        .modal-sheet {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            width: 100%;
            border-radius: 24px 24px 0 0;
            padding: 20px 24px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
            animation: slideUp 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 92vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            /* Keep modal above software keyboard on iOS/Android */
            position: relative;
        }

        /* When keyboard is open, modal input stays visible */
        @supports (height: env(keyboard-inset-height)) {
            .modal-overlay {
                padding-bottom: env(keyboard-inset-height, 0px);

        /* Notification Toast — bottom position on mobile */
        .toast {

        .toast-success {

            border-radius: 24px;

        @keyframes toastEnter {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }

        /* --- PREMIUM CSS MICRO-ANIMATIONS --- */

        /* 1. Staggered List Animation */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .list-item {
            animation: slideInUp 0.4s ease-out both;
        }

        .list-item:nth-child(1) {
            animation-delay: 0.05s;

        .list-item:nth-child(2) {
            animation-delay: 0.1s;
        }

        .list-item:nth-child(3) {
            animation-delay: 0.15s;
        }

        .list-item:nth-child(4) {
            animation-delay: 0.2s;
        }

        .list-item:nth-child(5) {
            animation-delay: 0.25s;
        }

        .list-item:nth-child(n+6) {
            animation-delay: 0.3s;
        }

        /* 2. Modal Slide Up & Overlay Fade */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUpModal {
            from {
                opacity: 0;
                transform: translateY(100%);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-overlay {
            animation: fadeIn 0.3s ease-out both;
        }

        .modal-sheet {
            animation: slideUpModal 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* 3. FAB Breathing Pulse */
        @keyframes breathingShadow {
            0% {
                box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3), 0 0 0 0 rgba(243, 156, 18, 0.4);
            }

            70% {
                box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3), 0 0 0 10px rgba(243, 156, 18, 0);

        .fab {

    <div id="root">
        <div
            style="padding: 20px; max-width: 600px; margin: 0 auto; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; gap: 24px; padding-top: 60px;">
            <div style="display: flex; gap: 16px; align-items: center; margin-bottom: 10px;">
                <div class="skeleton skeleton-avatar"></div>

                    <div class="skeleton skeleton-text" style="width: 40%"></div>

            </div>

            <div class="skeleton skeleton-block" style="height: 70px;"></div>
        </div>
    </div>

    <script>
        window.addEventListener('error', function (event) {
            var root = document.getElementById('root');
            if (root && root.innerHTML.indexOf('Aplicația se încarcă') > -1) {
                root.innerHTML = '<div style="padding: 40px; color: white; text-align: center; font-family: sans-serif;"><h2 style="color: #ff4d4d; margin-bottom: 20px;">Eroare Critică</h2><p>' + (event.message || 'JavaScript Error') + '</p><p style="margin-top:20px; font-size: 14px; color: #F39C12;">Te rugăm să deschizi aplicația direct din browserul tău web (Safari/Chrome).</p></div>';
            }
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Icon Component wrapping Lucide
        const Icon = ({ name, className = "lucide", style = {} }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    // Create icon node based on name
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        iconRef.current.innerHTML = '';
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '24');
                        svg.setAttribute('height', '24');
                        svg.setAttribute('viewBox', '0 0 24 24');
                        svg.setAttribute('fill', 'none');
                        svg.setAttribute('stroke', 'currentColor');
                        svg.setAttribute('stroke-width', '2');
                        svg.setAttribute('stroke-linecap', 'round');
                        svg.setAttribute('stroke-linejoin', 'round');
                        svg.setAttribute('class', className);

                        if (Array.isArray(iconData)) {
                            iconData.forEach(child => {
                                if (Array.isArray(child) && child.length >= 2) {
                                    const el = document.createElementNS('http://www.w3.org/2000/svg', child[0]);
                                    const attrs = child[1];
                                    if (typeof attrs === 'object' && attrs !== null) {
                                        Object.keys(attrs).forEach(attr => el.setAttribute(attr, attrs[attr]));
                                    }
                                    svg.appendChild(el);
                                }
                            });
                        }
                        iconRef.current.appendChild(svg);
                    }
                }
            }, [name, className]);

            return <i ref={iconRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', ...style }}></i>;
        };

        // Categorii Premium
        const CATEGORIES_DEFAULT = [
            { id: 'supermarket', icon: 'ShoppingCart', name: 'Supermarket & Alimente', color: '#27ae60' },
            { id: 'utilitati', icon: 'Lightbulb', name: 'Facturi & Utilități', color: '#f39c12' },
            { id: 'chirie', icon: 'Home', name: 'Chirie & Rate', color: '#8e44ad' },
            { id: 'transport', icon: 'Car', name: 'Transport & Auto', color: '#e67e22' },
            { id: 'sanatate', icon: 'HeartPulse', name: 'Sănătate & Farmacie', color: '#e74c3c' },
            { id: 'haine', icon: 'Shirt', name: 'Haine & Shopping', color: '#d35400' },
            { id: 'restaurant', icon: 'Utensils', name: 'Restaurant & Ieșiri', color: '#16a085' },
            { id: 'educatie', icon: 'GraduationCap', name: 'Educație & Cursuri', color: '#2980b9' },
            { id: 'vacante', icon: 'Plane', name: 'Vacanțe & Timp Liber', color: '#f1c40f' },
            { id: 'copii', icon: 'Baby', name: 'Copii & Familie', color: '#ff9ff3' },
            { id: 'economii', icon: 'PiggyBank', name: 'Economii & Investiții', color: '#2ecc71' },
            { id: 'factura_recurenta', icon: 'Receipt', name: 'Facturi Fixe & Rate', color: '#e67e22' },
            { id: 'altele', icon: 'HelpCircle', name: 'Alte Cheltuieli', color: '#95a5a6' }
        ];

        // Bugete specifice pieței din România
        const BUDGET_TEMPLATES = [
            { name: 'Salariul Minim', income: 2400 },
            { name: 'Salariul Mediu', income: 5000 },
            { name: 'Profesionist', income: 8000 },
            { name: 'Expert / IT', income: 15000 }
        ];

        // Tipuri Portofele (Wallets) V2
        const WALLET_TYPES = [
            { id: 'cash', name: 'Portofel Cash', icon: 'Wallet', class: 'wallet-type-cash' },
            { id: 'bank', name: 'Cont Curent Banca', icon: 'Landmark', class: 'wallet-type-bank' },
            { id: 'card', name: 'Card Cumpărături', icon: 'CreditCard', class: 'wallet-type-credit' },
            { id: 'revolut', name: 'Cont Revolut', icon: 'SmartphoneNfc', class: 'wallet-type-crypto' },
            { id: 'savings', name: 'Cont Economii', icon: 'PiggyBank', class: 'wallet-type-savings' },
        ];

        const QUOTES = [
            "Fiecare leu economisit azi e o secundă de libertate câștigată pentru mâine.",
            "Bogația nu constă în câți bani faci, ci în câți bani păstrezi.",
            "Fă ca banii tăi să muncească pentru tine, altfel tu vei munci pentru ei.",
            "Un buget îți spune unde să meargă banii tăi, în loc să te întrebi unde s-au dus.",
            "Cea mai mare bogăție este lipsa datoriilor și pacea minții."
        ];

        // Animated Number Hook for counting up effect
        const useAnimatedNumber = (endValue, duration = 800, decimals = 0) => {
            const [value, setValue] = useState(0);

            useEffect(() => {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    // easeOutQuart
                    const easeOut = 1 - Math.pow(1 - progress, 4);
                    setValue(endValue * easeOut);

                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    } else {
                        setValue(endValue);
                    }
                };
                window.requestAnimationFrame(step);
            }, [endValue, duration]);

            return Number(value.toFixed(decimals));
        };

        const SwipeableExpenseItem = ({ expense, cat, onDelete, triggerHaptic, isNew }) => {
            const [translateX, setTranslateX] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            const startXRef = useRef(0);
            const currentXRef = useRef(0);

            const handleTouchStart = (e) => {
                startXRef.current = e.touches[0].clientX;
                setIsDragging(true);
            };

            const handleTouchMove = (e) => {
                if (!isDragging) return;
                const currentX = e.touches[0].clientX;
                const diff = currentX - startXRef.current;

                if (diff < 0) {
                    currentXRef.current = diff;
                    setTranslateX(Math.max(diff, -100));
                } else {
                    currentXRef.current = 0;
                    setTranslateX(0);
                }
            };

            const handleTouchEnd = () => {
                setIsDragging(false);
                if (currentXRef.current < -60) {
                    if (triggerHaptic) triggerHaptic([50, 30, 50]);
                    setTranslateX(-500);
                    setTimeout(() => {
                        onDelete(expense.id);
                    }, 200);
                } else {
                    setTranslateX(0);
                }
            };

            return (
                <div style={{ position: 'relative', overflow: 'hidden', marginBottom: '8px', borderRadius: '16px', touchAction: 'pan-y' }}>
                    <div style={{
                        position: 'absolute', top: 0, right: 0, bottom: 0, left: 0,
                        background: 'var(--danger)', color: 'white',
                        display: 'flex', alignItems: 'center', justifyContent: 'flex-end',
                        paddingRight: '20px', borderRadius: '16px', zIndex: 0
                    }}>
                        <Icon name="Trash2" />
                    </div>

                    <div
                        className={`list-item ${isNew ? 'new-expense-drop glow-success' : ''}`}
                        style={{
                            transform: `translateX(${translateX}px)`,
                            transition: isDragging ? 'none' : 'transform 0.2s ease-out',
                            position: 'relative',
                            zIndex: 1,
                            margin: 0,
                            background: 'var(--bg)',
                            borderRadius: '16px'
                        }}
                        onTouchStart={handleTouchStart}
                        onTouchMove={handleTouchMove}
                        onTouchEnd={handleTouchEnd}
                    >
                        <div className="item-icon" style={{ background: 'rgba(255,255,255,0.05)', color: expense.type === 'income' ? 'var(--emerald)' : (expense.type === 'transfer' ? 'var(--blue)' : 'var(--gold)') }}><Icon name={expense.type === 'transfer' ? 'RefreshCw' : cat.icon} /></div>
                        <div className="item-details">
                            <div className="item-title" style={{ color: '#e2e8f0', fontSize: '15px' }}>{expense.name}</div>
                            <div className="item-subtitle" style={{ color: '#94a3b8', fontSize: '13px', display: 'flex', alignItems: 'center', gap: '4px' }}>
                                <span>{cat.name}</span>
                            </div>
                        </div>
                        <div style={{ textAlign: 'right', zIndex: 2 }}>
                            <div className="item-amount" style={{ color: expense.type === 'income' ? 'var(--emerald)' : (expense.type === 'transfer' ? 'var(--blue)' : '#ffffff') }}>
                                {expense.type === 'income' ? '+' : (expense.type === 'transfer' ? '' : '-')}
                                {Math.abs(expense.amount)} <span style={{ fontSize: '12px', color: '#94a3b8' }}>RON</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            // Core State
            const [activeTab, setActiveTab] = useState('home');
            const [currentMonth, setCurrentMonth] = useState(new Date());

            // Data State
            const [income, setIncome] = useState('');

            const [expenses, setExpenses] = useState([]);

            const [newGoalAmount, setNewGoalAmount] = useState('');

            const [isTransferModalOpen, setIsTransferModalOpen] = useState(false);

            const [selectedGoalId, setSelectedGoalId] = useState('');

            // Features
            const [dailyQuote, setDailyQuote] = useState('');
            const [toast, setToast] = useState(null);
            const [currentStreak, setCurrentStreak] = useState(0);
            const [openHelpIndex, setOpenHelpIndex] = useState(null);
            const [isAddSubOpen, setIsAddSubOpen] = useState(false);
            const [addedExpenseId, setAddedExpenseId] = useState(null);
            const [isAddingSuccess, setIsAddingSuccess] = useState(false);
            const [showStreakPopup, setShowStreakPopup] = useState(false);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const fileInputRef = useRef(null);

            // Cycle & Calendar
            const [payday, setPayday] = useState(1);
            const [selectedDate, setSelectedDate] = useState(new Date());

            // Security & Privacy
            const [savedPin, setSavedPin] = useState(null);
            const [isLocked, setIsLocked] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [isSettingPin, setIsSettingPin] = useState(false);
            const [tempPin, setTempPin] = useState('');
            const [isBlurred, setIsBlurred] = useState(false);

            // --- V2 Premium State ---
            const [userProfile, setUserProfile] = useState({ name: 'Utilizator', avatar: null, currency: 'RON' });



            // Category Budgets (Envelopes): { categoryId: limitNum }
            const [categoryLimits, setCategoryLimits] = useState({});

            // UI States for V2
            const [isFabMenuOpen, setIsFabMenuOpen] = useState(false);
            const [isExpenseModalOpen, setIsExpenseModalOpen] = useState(false);
            const [isIncomeModalOpen, setIsIncomeModalOpen] = useState(false);
            const [isProfileModalOpen, setIsProfileModalOpen] = useState(false);
            const [transactionType, setTransactionType] = useState('expense'); // 'expense' | 'income'
            const [editIncomeId, setEditIncomeId] = useState(null);
            const [newIncomeSource, setNewIncomeSource] = useState('');
            const [newIncomeAmount, setNewIncomeAmount] = useState('');


            // Notifications Note: HTML5 Notifications API require HTTPS and explicit user permissions. 
            // Since this runs offline, push notifications aren't natively reliable without a registered ServiceWorker.
            // We explain this limitation gracefully in settings.

            const getMonthKey = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
            const formatMonthInfo = (date) => {
                const months = ['Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie', 'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'];

            };

            const showToast = (message, type = 'info') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3500);
            };

            const triggerHaptic = (pattern) => {
                try {
                    if (window.navigator && window.navigator.vibrate) {
                        window.navigator.vibrate(pattern);
                    }
                } catch (e) { }
            };

            const handleTabChange = (tab) => {
                triggerHaptic([30]);
                setActiveTab(tab);
            };

            // Initialization
            useEffect(() => {
                // Set daily quote
                setDailyQuote(QUOTES[Math.floor(Math.random() * QUOTES.length)]);

                // Security Init & Privacy Blur
                const storedPin = window.localStorage ? window.localStorage.getItem('IAI_Planner_PIN') : null;
                if (storedPin) {
                    setSavedPin(storedPin);

                const storedLastLog = window.localStorage ? window.localStorage.getItem('IAI_Planner_LastLog') : null;

                let activeStreak = parseInt(storedStreak) || 0;
                if (storedLastLog) {
                    const lastD = new Date(storedLastLog);
                    const today = new Date();
                    lastD.setHours(0, 0, 0, 0);
                    today.setHours(0, 0, 0, 0);
                    const diffTime = Math.abs(today - lastD);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    if (diffDays > 1) {
                        activeStreak = 0; // Streak broken
                        if (window.localStorage) window.localStorage.setItem('IAI_Planner_Streak', '0');
                    }
                }
                setCurrentStreak(activeStreak);

                const handleVisibilityChange = () => {
                    if (document.hidden) {
                        setIsBlurred(true);
                        // Optional: if backgrounded for more than X mins, re-lock app (setIsLocked(true) if savedPin).
                    } else {
                        setIsBlurred(false);
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                // Load local storage completely for V2
                try {
                    const saved = window.localStorage ? window.localStorage.getItem('IAI_Planner_V2') : null;
                    if (saved) {
                        try {
                            const parsed = JSON.parse(saved);

                            if (parsed.subs) setSubs(parsed.subs);

                            // V2 Premium Loading

                            if (parsed.incomes) setIncomes(parsed.incomes);
                            if (parsed.categoryLimits) setCategoryLimits(parsed.categoryLimits);

                        } catch (e) {
                            console.error('Error loading data', e);
                        }
                    }
                } catch (e) {
                    console.error('LocalStorage unavailable', e);
                }

                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, []);

            // Month Data Load
            useEffect(() => {
                const mKey = getMonthKey(currentMonth);
                const monthData = dataStore[mKey] || { income: '', expenses: [] };
                setIncome(monthData.income || '');
                setExpenses(monthData.expenses || []);
            }, [currentMonth, dataStore]);

            const getCycleBounds = (date, pDay) => {
                const d = new Date(date);
                d.setHours(0, 0, 0, 0);
                let start = new Date(d.getFullYear(), d.getMonth(), pDay);
                if (d.getDate() < pDay) {
                    start = new Date(d.getFullYear(), d.getMonth() - 1, pDay);
                }
                const end = new Date(start.getFullYear(), start.getMonth() + 1, pDay - 1);
                end.setHours(23, 59, 59, 999);
                return { start, end };
            };

            const saveState = (inc, exps, targetMKey = null) => {
                const mKey = targetMKey || getMonthKey(currentMonth);
                const prevMonthData = dataStore[mKey] || {};
                const newDataStore = { ...dataStore, [mKey]: { ...prevMonthData, income: inc, expenses: exps } };
                setDataStore(newDataStore);
                try {
                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        const parsed = existingSaved ? JSON.parse(existingSaved) : { subs: [], userProfile, dataStore: {}, categoryLimits };
                        parsed.dataStore = newDataStore;
                        window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(parsed));
                    }
                } catch (e) {
                    console.error('LocalStorage save failed', e);
                }
            };

            // Core save method for the global app state container
            const saveGlobalState = (updates) => {
                try {
                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        const parsed = existingSaved ? JSON.parse(existingSaved) : { dataStore, subs, goals };
                        const newState = { ...parsed, ...updates };
                        window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(newState));
                    }
                } catch (e) { console.error('LocalStorage global save failed', e); }
            };

            const saveSubs = (newSubs) => {
                setSubs(newSubs);
                try {
                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        const parsed = existingSaved ? JSON.parse(existingSaved) : { dataStore: {} };
                        parsed.subs = newSubs;
                        window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(parsed));
                    }
                } catch (e) {
                    console.error('LocalStorage subs save failed', e);
                }
            };

            const deleteSub = (id) => {
                const updated = subs.filter(s => s.id !== id);
                saveSubs(updated);
                showToast('Abonament eliminat.', 'info');
            };

            const saveGoals = (newGoals) => {
                setGoals(newGoals);
                try {
                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        const parsed = existingSaved ? JSON.parse(existingSaved) : {};
                        parsed.goals = newGoals;
                        window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(parsed));
                    }
                } catch (e) { }
            };

            // Forms handling
            const [newExpenseName, setNewExpenseName] = useState('');
            const [newExpenseAmount, setNewExpenseAmount] = useState('');
            const [newExpenseCat, setNewExpenseCat] = useState('supermarket');
            const [newExpenseDate, setNewExpenseDate] = useState(''); // Allows past days
            const [newExpenseNote, setNewExpenseNote] = useState(''); // Optional memo

            // Voice Input Logic
            const [isListening, setIsListening] = useState(false);

            const handleVoiceInput = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    showToast('Funcția vocală nu este suportată pe acest browser.', 'error');
                    return;
                }
                const recognition = new SpeechRecognition();
                recognition.lang = 'ro-RO';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => {
                    triggerHaptic([50, 50]);
                    setIsListening(true);
                };

                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript.toLowerCase();
                    const amountMatch = speechResult.match(/\d+([.,]\d+)?/);
                    if (amountMatch) {
                        setNewExpenseAmount(amountMatch[0].replace(',', '.'));
                        let desc = speechResult.replace(amountMatch[0], '').replace(/lei|ron|bani/g, '').trim();
                        desc = desc.replace(/\b(o|un|de|pe|la)\b/g, '').trim();
                        desc = desc.replace(/\s+/g, ' ').trim();
                        setNewExpenseName(desc.charAt(0).toUpperCase() + desc.slice(1));
                        showToast(`Detectat: "${speechResult}"`, 'success');
                        triggerHaptic([30]);
                    } else {
                        showToast(`Nu am detectat suma în: "${speechResult}"`, 'warn');
                    }
                };

                recognition.onerror = () => {
                    showToast('Eroare la recunoașterea vocală.', 'error');
                    setIsListening(false);
                };

                recognition.onend = () => {
                    setIsListening(false);
                };

                recognition.start();
            };

            // --- SMART AUTOCOMPLETE ---
            useEffect(() => {
                if (newExpenseName.trim().length > 2) {
                    const searchName = newExpenseName.trim().toLowerCase();
                    // Căutare în istoricul global
                    let foundCat = null;
                    Object.values(dataStore).forEach(monthData => {
                        const exps = monthData.expenses || [];
                        const match = exps.find(e => e.name.toLowerCase() === searchName);
                        if (match && !foundCat) {
                            foundCat = match.categoryId;
                        }
                    });
                    if (foundCat) {
                        setNewExpenseCat(foundCat);
                    }
                }
            }, [newExpenseName, dataStore]);

            // --- AUTO-LOGGING RECURENȚE ---
            useEffect(() => {
                const mKey = getMonthKey(currentMonth);
                const monthData = dataStore[mKey];

                // Trage la început de lună automat dacă există venit setat și recurențe active
                if (monthData && monthData.income && subs.length > 0 && !monthData.subsAdded) {
                    let newExps = [...(monthData.expenses || [])];
                    let addedAny = false;

                    subs.forEach(sub => {
                        const alreadyExists = newExps.some(e => e.name === sub.name && e.amount === sub.amount);
                        if (!alreadyExists) {
                            newExps.push({
                                id: Date.now() + Math.random(), // Unique ID
                                name: sub.name,
                                amount: parseFloat(sub.amount),
                                categoryId: 'factura_recurenta', // Specific internal tag or just 'altele'
                                date: new Date().toISOString(),
                                isAuto: true
                            });
                            addedAny = true;
                        }
                    });

                    newExps.sort((a, b) => new Date(b.date) - new Date(a.date));

                    // Marhează luna asta ca având recurențele aplicate
                    const newDataStore = { ...dataStore, [mKey]: { ...monthData, expenses: newExps, subsAdded: true } };
                    setDataStore(newDataStore);
                    setExpenses(newExps);

                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        if (existingSaved) {
                            const parsed = JSON.parse(existingSaved);
                            parsed.dataStore = newDataStore;
                            window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(parsed));

                    if (addedAny) {

                    }

            const handleIncomeChange = (val) => {

                console.log("handleIncomeChange is deprecated. Use incomes array.");

            const handleAddExpense = (e) => {

                    showToast('Completează ambele câmpuri!', 'warning');

                let activeDateObj = newExpenseDate ? new Date(newExpenseDate) : new Date();
                const tzOffset = activeDateObj.getTimezoneOffset() * 60000;

                    id: Date.now(),
                    name: newExpenseName,
                    amount: amount,
                    type: 'expense',
                    categoryId: newExpenseCat,
                    date: localISOTime,
                    isManualDate: !!newExpenseDate
                };

                const targetMKey = getMonthKey(new Date(localISOTime));
                if (targetMKey === getMonthKey(currentMonth)) {
                    const updatedList = [expenseItem, ...expenses];
                    setExpenses(updatedList);
                    saveState(income, updatedList);
                } else {
                    const targetMonthData = dataStore[targetMKey] || { income: 0, expenses: [] };
                    const updatedTargetExps = [expenseItem, ...(targetMonthData.expenses || [])];
                    const newDataStore = { ...dataStore, [targetMKey]: { ...targetMonthData, expenses: updatedTargetExps } };
                    setDataStore(newDataStore);
                    saveGlobalState({ dataStore: newDataStore });
                }

                setNewExpenseName('');
                setNewExpenseAmount('');
                setNewExpenseCat('supermarket');
                setNewExpenseDate('');

                // Phase 8 WOW: Trigger Success Animations
                setIsAddingSuccess(true);
                triggerHaptic([100, 50, 100]);
                setAddedExpenseId(expenseItem.id);

                setTimeout(() => {
                    setIsAddingSuccess(false);
                    setIsExpenseModalOpen(false); // V2 named
                    setTimeout(() => setAddedExpenseId(null), 1200);
                }, 1000);

                // Gamification Streak update remains...
                const todayStr = new Date().toDateString();
                const savedLastLog = window.localStorage ? window.localStorage.getItem('IAI_Planner_LastLog') : null;
                if (savedLastLog !== todayStr && transactionType === 'expense') {
                    const newStreak = currentStreak + 1;
                    setCurrentStreak(newStreak);
                    if (window.localStorage) {
                        window.localStorage.setItem('IAI_Planner_LastLog', todayStr);
                        window.localStorage.setItem('IAI_Planner_Streak', newStreak.toString());
                    }
                }
            };

            // Fix Delete logic to restore Wallet balance
            const deleteExpense = (id) => {
                const updated = expenses.filter(e => e.id !== id);
                setExpenses(updated);
                // Correctly save to current month state
                const mKey = getMonthKey(currentMonth);
                const prevMonthData = dataStore[mKey] || {};
                saveState(prevMonthData.income || 0, updated);
            };

            const [newSubName, setNewSubName] = useState('');
            const [newSubAmount, setNewSubAmount] = useState('');

            const handleAddSub = (e) => {
                e.preventDefault();
                if (!newSubName || !newSubAmount) {
                    showToast('Completează ambele câmpuri pentru abonament.', 'warning');
                    return;
                }

                const amount = parseFloat(newSubAmount);
                if (amount <= 0 || isNaN(amount)) {
                    showToast('Abonamentul trebuie să fie minim 0.01 RON.', 'warning');
                    return;
                }
                const subItem = {
                    id: Date.now(),
                    name: newSubName,
                    amount: amount
                };

                const updatedList = [...subs, subItem];
                saveSubs(updatedList);

                setNewSubName('');
                setNewSubAmount('');
                setIsAddSubOpen(false);
                showToast('Abonament setat cu succes!', 'success');
            };

            const handleAddGoal = (e) => {
                e.preventDefault();
                if (!newGoalName || !newGoalAmount) {
                    showToast('Completează ambele câmpuri pentru obiectiv.', 'warning');
                    return;
                }
                const amount = parseFloat(newGoalAmount);
                if (amount <= 0 || isNaN(amount)) {
                    showToast('Suma țintă trebuie să fie mai mare ca 0.', 'warning');
                    return;
                }
                const goal = {
                    id: Date.now(),
                    name: newGoalName,
                    targetAmount: amount,
                    currentSavedAmount: 0,
                    targetDate: newGoalDate || null,
                    icon: 'Target'
                };
                saveGoals([...goals, goal]);
                setNewGoalName('');
                setNewGoalAmount('');
                setNewGoalDate('');
                setIsAddGoalOpen(false);
                showToast('Obiectiv salvat cu succes!', 'success');
                triggerHaptic([50, 50]);
            };

            const handleTransferToGoal = (e) => {
                e.preventDefault();
                if (!selectedGoalId || !transferAmount) return;

                const amount = parseFloat(transferAmount);
                if (amount <= 0 || isNaN(amount)) {
                    showToast('Suma trebuie să fie validă.', 'warning');
                    return;
                }

                const d = new Date(selectedDate);
                d.setHours(new Date().getHours());
                d.setMinutes(new Date().getMinutes());

                const newExp = {
                    id: Date.now() + Math.random(),
                    name: `Economii pt. Obiectiv`,
                    amount: amount,
                    categoryId: 'investitii_economii',
                    date: d.toISOString()
                };

                const targetMKey = getMonthKey(d);
                if (targetMKey === getMonthKey(currentMonth)) {
                    const updatedExps = [newExp, ...expenses];
                    setExpenses(updatedExps);
                    // Use totalIncome or fallback to current income state
                    const actualInc = totalIncome || income;
                    saveState(actualInc, updatedExps);
                } else {
                    const targetMonthData = dataStore[targetMKey] || { income: '', expenses: [] };
                    const updatedTargetExps = [newExp, ...(targetMonthData.expenses || [])];
                    const newDataStore = { ...dataStore, [targetMKey]: { ...targetMonthData, expenses: updatedTargetExps } };
                    setDataStore(newDataStore);
                    saveGlobalState({ dataStore: newDataStore });
                }

                let goalName = '';
                const updatedGoals = goals.map(g => {
                    if (g.id.toString() === selectedGoalId.toString()) {
                        goalName = g.name;
                        return { ...g, currentSavedAmount: g.currentSavedAmount + amount };
                    }
                    return g;
                });
                saveGoals(updatedGoals);

                setIsTransferModalOpen(false);
                setTransferAmount('');
                setSelectedGoalId('');

                showToast(`Ai pus deoparte ${amount.toFixed(0)} RON pentru ${goalName}! 🎯`, 'success');
                triggerHaptic([100, 50, 100]);
            };

            // Math Logic
            const totalIncome = incomes.reduce((sum, inc) => sum + inc.amount, 0);
            const totalFixed = subs.reduce((sum, s) => sum + s.amount, 0);
            const totalExpenses = expenses.reduce((sum, exp) => sum + exp.amount, 0);
            const remaining = totalIncome - totalFixed - totalExpenses;

            // Currency formatter
            const fmt = (n) => {
                if (n === undefined || n === null || isNaN(n)) return '0';
                const abs = Math.abs(n);

            // ---------------------------------------------

            // Daily Allowance Intel Engine
            const today = new Date();

            const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate();
            const daysPassed = isCurrentMonth ? today.getDate() : daysInMonth;
            const daysLeft = isCurrentMonth ? (daysInMonth - daysPassed + 1) : 0;

            const allowancePerDay = daysLeft > 0 && remaining > 0 ? (remaining / daysLeft).toFixed(0) : 0;

            // Financial Allocator (50/30/20)
            const needsCat = ['supermarket', 'utilitati', 'chirie', 'transport', 'sanatate', 'educatie', 'copii', 'factura_recurenta'];
            const wantsCat = ['haine', 'restaurant', 'vacante', 'vicii', 'altele'];
            const savingsCat = ['economii', 'investitii_economii'];

            const spentNeeds = expenses.filter(e => needsCat.includes(e.categoryId)).reduce((sum, e) => sum + e.amount, 0);
            const spentWants = expenses.filter(e => wantsCat.includes(e.categoryId)).reduce((sum, e) => sum + e.amount, 0);
            const spentSavings = expenses.filter(e => savingsCat.includes(e.categoryId)).reduce((sum, e) => sum + e.amount, 0);

            const targetNeeds = totalIncome * 0.50;
            const targetWants = totalIncome * 0.30;
            const targetSavings = totalIncome * 0.20;

            const pctNeeds = totalIncome > 0 ? Math.min((spentNeeds / targetNeeds) * 100, 100) : 0;
            const pctWants = totalIncome > 0 ? Math.min((spentWants / targetWants) * 100, 100) : 0;
            const pctSavings = totalIncome > 0 ? Math.min((spentSavings / targetSavings) * 100, 100) : 0;

            // Global Savings for Gamification (Rank & Level)
            let globalSavings = 0;
            Object.values(dataStore).forEach(monthData => {

            if (globalSavings >= 5000) { userRankName = "Milionar în Devenire"; userRankIcon = "Gem"; userRankColor = "#F39C12"; }
            if (globalSavings >= 20000) { userRankName = "Maestru IAI"; userRankIcon = "Crown"; userRankColor = "#9B59B6"; }

            // AI Offline Insights Generator & Allocation Engine
            let aiMessage = "Balanța ta arată bine! Adaugă cheltuieli pentru a primi analize avansate din partea IAI.";

            let recNeeds = Math.max(0, targetNeeds - spentNeeds);
            let recWants = Math.max(0, targetWants - spentWants);
            let recSavings = Math.max(0, targetSavings - spentSavings);

            if (totalIncome > 0) {

                                    }
                                }
                            }

                    }

            const toggleHelp = (index) => {

            // --- SECURITY AND DATA BACKUP ACTIONS ---
            const handlePinPress = (digit) => {

                    if (newPin.length === 4) {

                            } else {

            const removePin = () => {

            const handleExportJson = () => {

            const handleImportJson = (e) => {

                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            // CALENDAR VARS & HOISTED LOGIC
            const { start: cycleStart, end: cycleEnd } = getCycleBounds(selectedDate, payday);
            const mKey1 = getMonthKey(cycleStart);
            const mKey2 = getMonthKey(cycleEnd);

            let cycleExps = [];
            if (dataStore[mKey1]?.expenses) cycleExps.push(...dataStore[mKey1].expenses);
            if (mKey1 !== mKey2 && dataStore[mKey2]?.expenses) cycleExps.push(...dataStore[mKey2].expenses);
            cycleExps = cycleExps.filter(e => new Date(e.date) >= cycleStart && new Date(e.date) <= cycleEnd);

            const selectedStr = selectedDate.toISOString().split('T')[0];
            const dayExps = cycleExps.filter(e => e.date.startsWith(selectedStr));
            const dayTotal = dayExps.filter(e => e.categoryId !== 'factura_recurenta').reduce((s, e) => s + e.amount, 0);

            const spentBefore = cycleExps.filter(e => new Date(e.date) >= cycleStart && new Date(e.date) < new Date(selectedDate).setHours(0, 0, 0, 0) && e.categoryId !== 'factura_recurenta').reduce((s, e) => s + e.amount, 0);

            const fixedDailyAllowance = totalDaysInCycle > 0 ? (cycleBudget / totalDaysInCycle) : 0;

                        {/* Compact inline error badge — no fixed overlay */}
                        {toast && (
                            <div style={{

                                border: `1px solid ${toast.type === 'danger' ? 'rgba(231,76,60,0.4)' : 'rgba(52,152,219,0.3)'}`,
