    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Lucide Icons (Premium SVG Icons) -->

    <!-- Fonts from original CSS -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            /* Brand Colors from style.css */
            --midnight: #0A1931;
            --midnight2: #0d2040;
            --anthracite: #2D3436;
            --forest: #1B4332;
            --emerald: #2ECC71;
            --gold: #F39C12;
            --gold-dim: #c47d0a;
            --white: #FFFFFF;
            --gray: #BDC3C7;
            --dgray: #636E72;
            --bg: #080f1e;
            --bg2: #0d1829;
            --card-bg: #0f1e35;
            --border: rgba(243, 156, 18, 0.15);
            --border-dim: rgba(255, 255, 255, 0.07);

            /* Action Colors */
            --danger: #ff4d4d;
            --warning: #ffb84d;
            --info: #4da6ff;

            /* Visuals */
            --glass-bg: rgba(8, 15, 30, 0.85);
            --blur: blur(16px);
            --font-head: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 12px;
            --radius-lg: 20px;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--white);
            min-height: 100vh;
            line-height: 1.65;
            overflow-x: hidden;
            padding-bottom: 90px;
            /* Space for bottom nav */
            /* Add delicate background grid pattern */
            background-image:
                linear-gradient(rgba(243, 156, 18, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(243, 156, 18, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: var(--font-head);
        }

        .lucide {
            width: 24px;
            height: 24px;
            stroke-width: 2;
            flex-shrink: 0;
        }

        .lucide-sm {
            width: 18px;
            height: 18px;
        }

        .lucide-lg {
            width: 32px;
            height: 32px;
            stroke-width: 1.5;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            min-height: 100vh;
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-dim);
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 42px;
            height: 42px;
            background: var(--midnight);
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-head);
            font-weight: 800;
            font-size: 16px;
            color: var(--gold);
            position: relative;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.2);
        }

        .logo-box::after {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid rgba(243, 156, 18, 0.3);
        }

        .brand-text h1 {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.2px;
            line-height: 1.2;
            color: var(--white);
        }

        .brand-text p {
            font-size: 11px;
            color: var(--gold);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--font-head);
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            padding: 8px 12px;
            border-radius: 100px;
            border: 1px solid var(--border-dim);
        }

        .month-btn {
            background: transparent;
            border: none;
            color: var(--gray);
            cursor: pointer;
            padding: 0 4px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .month-btn:hover {
            color: var(--gold);
        }

        .month-btn:disabled {
            color: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
        }

        .month-label {
            font-size: 13px;
            font-weight: 700;
            font-family: var(--font-head);
            min-width: 65px;
            text-align: center;
            color: var(--white);
        }

        /* Motivational Widget */
        .motivation-card {
            background: linear-gradient(145deg, var(--midnight2), var(--card-bg));
            border: 1px solid var(--border-dim);
            border-left: 3px solid var(--gold);
            padding: 14px 18px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .quote-icon {
            color: var(--gold);
            opacity: 0.8;
            margin-top: 2px;
        }

        .quote-text {
            font-size: 13px;
            color: var(--gray);
            font-style: italic;
            line-height: 1.5;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(145deg, var(--card-bg), var(--bg2));
            padding: 24px;
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(243, 156, 18, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .balance-label {
            font-size: 13px;
            color: var(--gray);
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-amount {
            font-size: 42px;
            font-weight: 800;
            font-family: var(--font-mono);
            letter-spacing: -1px;
            margin-bottom: 20px;
            color: var(--white);
        }

        /* Daily Progress */
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-safe {
            background: rgba(46, 204, 113, 0.15);
            color: var(--emerald);
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .status-warn {
            background: rgba(243, 156, 18, 0.15);
            color: var(--gold);
            border: 1px solid rgba(243, 156, 18, 0.3);
        }

        .status-danger {
            background: rgba(255, 77, 77, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 77, 77, 0.3);
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 100px;
            transition: width 0.6s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .fill-safe {
            background: linear-gradient(90deg, #27ae60, var(--emerald));
        }

        .fill-warn {
            background: linear-gradient(90deg, #d35400, var(--gold));
        }

        .fill-danger {
            background: linear-gradient(90deg, #c0392b, var(--danger));
        }

        .balance-stats {
            display: flex;
            gap: 16px;
            border-top: 1px solid var(--border-dim);
            padding-top: 16px;
            margin-top: 16px;
        }

        .stat-item {
            flex: 1;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-value.green {
            color: var(--emerald);
        }

        .stat-value.red {
            color: var(--white);
        }

        /* Keeping Red elegant, maybe white with lucide icon */

        /* Generic Cards */
        .content-section {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            font-family: var(--font-head);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--white);
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-dim);
        }

        /* Inputs & Buttons */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--gray);
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--white);
            padding: 14px 16px;
            border-radius: var(--radius);
            font-size: 16px;
            font-family: var(--font-body);
            transition: all 0.2s;
            appearance: none;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(243, 156, 18, 0.05);
        }

        /* Select Chevron via SVG data URI */
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23BDC3C7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            padding-right: 40px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px;
            border-radius: var(--radius);
            border: none;
            font-size: 15px;
            font-weight: 700;
            font-family: var(--font-head);
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .btn-primary {
            background: var(--gold);
            color: #000;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
            border: 1px solid var(--border-dim);
        }

        .btn-outline {
            background: transparent;
            color: var(--gold);
            border: 1px solid rgba(243, 156, 18, 0.4);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            width: auto;
        }

        /* List Items */
        .list-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius);
            margin-bottom: 12px;
            border: 1px solid var(--border-dim);
            transition: background 0.2s;
        }

        .list-item:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .item-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--bg2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            border: 1px solid var(--border-dim);
            color: var(--gray);
        }

        .item-details {
            flex: 1;
        }

        .item-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 2px;
            color: var(--white);
        }

        .item-subtitle {
            font-size: 12px;
            color: var(--dgray);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .item-amount {
            font-weight: 600;
            font-family: var(--font-mono);
            font-size: 16px;
            text-align: right;
            color: var(--white);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-top: 1px solid var(--border-dim);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--dgray);
            cursor: pointer;
            transition: color 0.2s;
            width: 60px;
        }

        .nav-item.active {
            color: var(--gold);
        }

        .nav-label {
            font-size: 10px;
            font-weight: 700;
            font-family: var(--font-head);
        }

        /* Floating Add Button */
        .fab {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            width: 56px;
            height: 56px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            box-shadow: 0 8px 24px rgba(243, 156, 18, 0.4);
            cursor: pointer;
            border: 4px solid var(--bg);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 101;
        }

        .fab:active {
            transform: translateX(-50%) scale(0.9);
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            animation: fadeIn 0.3s;
        }

        .modal-sheet {
            background: var(--bg);
            width: 100%;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
            animation: slideUp 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            border-top: 1px solid var(--border-dim);
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            color: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .close-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Daily Intel Card */
        .daily-intel {
            background: linear-gradient(135deg, rgba(26, 188, 156, 0.1), rgba(46, 204, 113, 0.05));
            border: 1px solid rgba(46, 204, 113, 0.2);
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .daily-intel.intel-danger {
            background: linear-gradient(135deg, rgba(255, 77, 77, 0.1), rgba(192, 57, 43, 0.05));
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        .intel-icon {
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--emerald);
        }

        .daily-intel.intel-danger .intel-icon {
            color: var(--danger);
        }

        .intel-text h4 {
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--gray);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .intel-text .amount {
            font-family: var(--font-mono);
            font-size: 24px;
            font-weight: 800;
            color: var(--white);
            line-height: 1;
        }

        /* Notification Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border-dim);
            padding: 14px 20px;
            border-radius: 50px;
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: toastEnter 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            color: var(--white);
        }

        .toast-success i {
            color: var(--emerald);
        }

        .toast-warning i {
            color: var(--warning);
        }

        .toast-info i {
            color: var(--info);
        }

        @keyframes toastEnter {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
    </style>
</head>

<body>
    <div id="root">
        <div
            style="padding: 40px 20px; text-align: center; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <div style="font-size: 48px; font-weight: bold; color: #F39C12; margin-bottom: 20px;">IAI</div>
            <h2 style="margin-bottom: 10px;">Aplicația se încarcă...</h2>
            <p style="color: #636E72; font-size: 14px; max-width: 320px; margin-top: 10px;">
                Dacă ecranul nu pornește, asigură-te că ai o conexiune activă la internet.
                <br><br>
                <strong style="color: #F39C12;">Notă pe Mobil (iPhone/Android):</strong> Nu deschide fișierul din
                WhatsApp sau din secțiunea "Fișiere". Te rugăm să-l deschizi direct în <b>Safari</b> sau <b>Chrome</b>.
            </p>
        </div>
    </div>

    <script>
        window.addEventListener('error', function (event) {
            var root = document.getElementById('root');
            if (root && root.innerHTML.indexOf('Aplicația se încarcă') > -1) {
                root.innerHTML = '<div style="padding: 40px; color: white; text-align: center; font-family: sans-serif;"><h2 style="color: #ff4d4d; margin-bottom: 20px;">Eroare Critică</h2><p>' + (event.message || 'JavaScript Error') + '</p><p style="margin-top:20px; font-size: 14px; color: #F39C12;">Te rugăm să deschizi aplicația direct din browserul tău web (Safari/Chrome).</p></div>';
            }
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Icon Component wrapping Lucide
        const Icon = ({ name, className = "lucide", style = {} }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    // Create icon node based on name
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        iconRef.current.innerHTML = '';
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '24');
                        svg.setAttribute('height', '24');
                        svg.setAttribute('viewBox', '0 0 24 24');
                        svg.setAttribute('fill', 'none');
                        svg.setAttribute('stroke', 'currentColor');
                        svg.setAttribute('stroke-width', '2');
                        svg.setAttribute('stroke-linecap', 'round');
                        svg.setAttribute('stroke-linejoin', 'round');
                        svg.setAttribute('class', className);

                        if (Array.isArray(iconData)) {
                            iconData.forEach(child => {
                                if (Array.isArray(child) && child.length >= 2) {
                                    const el = document.createElementNS('http://www.w3.org/2000/svg', child[0]);
                                    const attrs = child[1];
                                    if (typeof attrs === 'object' && attrs !== null) {
                                        Object.keys(attrs).forEach(attr => el.setAttribute(attr, attrs[attr]));
                                    }
                                    svg.appendChild(el);
                                }
                            });
                        }
                        iconRef.current.appendChild(svg);
                    }
                }
            }, [name, className]);

            return <i ref={iconRef} style={{ display: 'inline-flex', ...style }}></i>;
        };

        // Categorii Premium
        const CATEGORIES_DEFAULT = [
            { id: 'supermarket', icon: 'ShoppingCart', name: 'Supermarket & Alimente' },
            { id: 'utilitati', icon: 'Lightbulb', name: 'Facturi & Utilități' },
            { id: 'chirie', icon: 'Home', name: 'Chirie & Rate' },
            { id: 'transport', icon: 'Car', name: 'Transport & Auto' },
            { id: 'sanatate', icon: 'HeartPulse', name: 'Sănătate & Farmacie' },
            { id: 'haine', icon: 'Shirt', name: 'Haine & Shopping' },
            { id: 'restaurant', icon: 'Utensils', name: 'Restaurant & Ieșiri' },
            { id: 'educatie', icon: 'GraduationCap', name: 'Educație & Cursuri' },
            { id: 'vacante', icon: 'Plane', name: 'Vacanțe & Timp Liber' },
            { id: 'copii', icon: 'Baby', name: 'Copii & Familie' },
            { id: 'economii', icon: 'PiggyBank', name: 'Economii & Investiții' },
            { id: 'vicii', icon: 'Coffee', name: 'Cafea & Diverse' },
            { id: 'altele', icon: 'HelpCircle', name: 'Altele' }
        ];

        // Bugete specifice pieței din România
        const BUDGET_TEMPLATES = [
            { name: 'Salariul Minim', income: 2400 },
            { name: 'Salariul Mediu', income: 5000 },
            { name: 'Profesionist', income: 8000 },
            { name: 'Expert / IT', income: 15000 }
        ];

        const QUOTES = [
            "Fiecare leu economisit azi e o secundă de libertate câștigată pentru mâine.",
            "Bogația nu constă în câți bani faci, ci în câți bani păstrezi.",
            "Fă ca banii tăi să muncească pentru tine, altfel tu vei munci pentru ei.",
            "Un buget îți spune unde să meargă banii tăi, în loc să te întrebi unde s-au dus.",
            "Cea mai mare bogăție este lipsa datoriilor și pacea minții."
        ];

        function App() {
            // Core State
            const [activeTab, setActiveTab] = useState('home');
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [currentMonth, setCurrentMonth] = useState(new Date());

            // Data State
            const [income, setIncome] = useState('');
            const [expenses, setExpenses] = useState([]);
            const [dataStore, setDataStore] = useState({});

            // Features
            const [dailyQuote, setDailyQuote] = useState('');
            const [toast, setToast] = useState(null);
            const [openHelpIndex, setOpenHelpIndex] = useState(null);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // Notifications Note: HTML5 Notifications API require HTTPS and explicit user permissions. 
            // Since this runs offline, push notifications aren't natively reliable without a registered ServiceWorker.
            // We explain this limitation gracefully in settings.

            const getMonthKey = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
            const formatMonthInfo = (date) => {
                const months = ['Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie', 'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'];
                return `${months[date.getMonth()]} ${date.getFullYear()}`;
            };

            const showToast = (message, type = 'info') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3500);
            };

            // Initialization
            useEffect(() => {
                // Set daily quote
                setDailyQuote(QUOTES[Math.floor(Math.random() * QUOTES.length)]);

                // Load local storage
                try {
                    const saved = window.localStorage ? window.localStorage.getItem('IAI_Planner_V2') : null;
                    if (saved) {
                        try {
                            const parsed = JSON.parse(saved);
                            setDataStore(parsed.dataStore || {});
                        } catch (e) {
                            console.error('Error loading data', e);
                        }
                    }
                } catch (e) {
                    console.error('LocalStorage unavailable', e);
                }
            }, []);

            // Month Data Load
            useEffect(() => {
                const mKey = getMonthKey(currentMonth);
                const monthData = dataStore[mKey] || { income: '', expenses: [] };
                setIncome(monthData.income || '');
                setExpenses(monthData.expenses || []);
            }, [currentMonth, dataStore]);

            const saveState = (inc, exps) => {
                const mKey = getMonthKey(currentMonth);
                const newDataStore = { ...dataStore, [mKey]: { income: inc, expenses: exps } };
                setDataStore(newDataStore);
                try {
                    if (window.localStorage) {
                        window.localStorage.setItem('IAI_Planner_V2', JSON.stringify({ dataStore: newDataStore }));
                    }
                } catch (e) {
                    console.error('LocalStorage save failed', e);
                }
            };

            // Forms handling
            const [newExpenseName, setNewExpenseName] = useState('');
            const [newExpenseAmount, setNewExpenseAmount] = useState('');
            const [newExpenseCat, setNewExpenseCat] = useState('supermarket');

            const handleIncomeChange = (val) => {
                setIncome(val);
                saveState(val, expenses);
            };

            const handleAddExpense = (e) => {
                e.preventDefault();
                if (!newExpenseName || !newExpenseAmount) {
                    showToast('Completează ambele câmpuri!', 'warning');
                    return;
                }

                const amount = parseFloat(newExpenseAmount);
                const expenseItem = {
                    id: Date.now(),
                    name: newExpenseName,
                    amount: amount,
                    categoryId: newExpenseCat,
                    date: new Date().toISOString()
                };

                const updatedList = [expenseItem, ...expenses];
                setExpenses(updatedList);
                saveState(income, updatedList);

                setNewExpenseName('');
                setNewExpenseAmount('');
                setNewExpenseCat('supermarket');
                setIsAddModalOpen(false);
                showToast('Adăugat cu succes!', 'success');
            };

            const deleteExpense = (id) => {
                const updatedList = expenses.filter(e => e.id !== id);
                setExpenses(updatedList);
                saveState(income, updatedList);
                showToast('Cheltuială ștearsă!', 'info');
            };

            // Math Logic
            const totalIncome = parseFloat(income || 0);
            const totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
            const remaining = totalIncome - totalExpenses;
            let spendPercentage = 0;
            if (totalIncome > 0) {
                spendPercentage = Math.min((totalExpenses / totalIncome) * 100, 100);
            }

            // Health Logic
            let healthStatus = { msg: "Balanță Zen", class: "status-safe", fill: "fill-safe", icon: "Smile" };
            if (spendPercentage >= 90) {
                healthStatus = { msg: "Critic", class: "status-danger", fill: "fill-danger", icon: "AlertTriangle" };
            } else if (spendPercentage >= 75) {
                healthStatus = { msg: "Atenție", class: "status-warn", fill: "fill-warn", icon: "AlertCircle" };
            }

            // Daily Allowance Intel Engine
            const today = new Date();
            const isCurrentMonth = currentMonth.getMonth() === today.getMonth() && currentMonth.getFullYear() === today.getFullYear();

            const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate();
            const daysPassed = isCurrentMonth ? today.getDate() : daysInMonth;
            const daysLeft = isCurrentMonth ? (daysInMonth - daysPassed + 1) : 0;

            const allowancePerDay = daysLeft > 0 && remaining > 0 ? (remaining / daysLeft).toFixed(0) : 0;

            // Chart rendering
            useEffect(() => {
                if (activeTab === 'analytics' && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    if (chartInstance.current) chartInstance.current.destroy();

                    const byCat = {};
                    expenses.forEach(e => {
                        const c = CATEGORIES_DEFAULT.find(cat => cat.id === e.categoryId);
                        const name = c ? c.name : 'Altele';
                        byCat[name] = (byCat[name] || 0) + e.amount;
                    });

                    const labels = Object.keys(byCat);
                    const data = Object.values(byCat);

                    if (labels.length > 0) {
                        Chart.defaults.color = '#BDC3C7';
                        chartInstance.current = new Chart(ctx, {
                            type: 'doughnut',
                            data: {
                                labels: labels,
                                datasets: [{
                                    data: data,
                                    backgroundColor: ['#F39C12', '#2ECC71', '#3498DB', '#E74C3C', '#9B59B6', '#1ABC9C', '#F1C40F', '#E67E22'],
                                    borderWidth: 0,
                                    hoverOffset: 4
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                cutout: '75%',
                                plugins: { legend: { position: 'right', labels: { font: { family: 'Plus Jakarta Sans', size: 12 } } } }
                            }
                        });
                    }
                }
            }, [activeTab, expenses]);

            const toggleHelp = (index) => {
                setOpenHelpIndex(openHelpIndex === index ? null : index);
            };

            return (
                <div className="app-container">
                    {/* Toasts */}
                    {toast && (
                        <div className={`toast toast-${toast.type}`}>
                            {toast.type === 'success' && <Icon name="CheckCircle2" />}
                            {toast.type === 'warning' && <Icon name="AlertTriangle" />}
                            {toast.type === 'info' && <Icon name="Info" />}
                            {toast.message}
                        </div>
                    )}

                    {/* Header */}
                    <div className="header">
                        <div className="brand-section">
                            <div className="logo-box">IAI</div>
                            <div className="brand-text">
                                <p>Inginerul cu AI</p>
                                <h1>Bugetul Personal</h1>
                            </div>
                        </div>
                        <div className="month-selector">
                            <button className="month-btn" onClick={() => {
                                const n = new Date(currentMonth); n.setMonth(n.getMonth() - 1); setCurrentMonth(n);
                            }}><Icon name="ChevronLeft" className="lucide-sm" /></button>

                            <span className="month-label" style={{ textTransform: 'capitalize' }}>
                                {formatMonthInfo(currentMonth).split(' ')[0].substring(0, 3)} '{String(currentMonth.getFullYear()).substring(2)}
                            </span>

                            <button className="month-btn" onClick={() => {
                                const n = new Date(currentMonth); n.setMonth(n.getMonth() + 1); setCurrentMonth(n);
                            }} disabled={currentMonth >= today && currentMonth.getMonth() >= today.getMonth()}><Icon name="ChevronRight" className="lucide-sm" /></button>
                        </div>
                    </div>

                    {/* Navigation Logic */}
                    {activeTab === 'home' && (
                        <div className="content-section">
                            {/* Motivational Banner */}
                            <div className="motivation-card">
                                <span className="quote-icon"><Icon name="Quote" /></span>
                                <div className="quote-text">{dailyQuote}</div>
                            </div>

                            {/* Main Balance Card */}
                            <div className="balance-card">
                                <div className="progress-header">
                                    <span className="balance-label">Disponibil Până la Salariu</span>
                                    {totalIncome > 0 && (
                                        <div className={`status-badge ${healthStatus.class}`}>
                                            <Icon name={healthStatus.icon} className="lucide-sm" />
                                            {healthStatus.msg}
                                        </div>
                                    )}
                                </div>
                                <div className="balance-amount">{remaining.toFixed(0)} <span style={{ fontSize: '20px', color: 'var(--gray)' }}>RON</span></div>

                                <div className="progress-track">
                                    <div className={`progress-fill ${healthStatus.fill}`} style={{ width: `${spendPercentage}%` }}></div>
                                </div>
                                <div style={{ fontSize: '12px', color: 'var(--gray)', textAlign: 'right', marginTop: '4px' }}>
                                    Cheltuit: {spendPercentage.toFixed(0)}%
                                </div>

                                <div className="balance-stats">
                                    <div className="stat-item">
                                        <div style={{ fontSize: '11px', color: 'var(--dgray)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Venit (RON)</div>
                                        <div className="stat-value green">
                                            <Icon name="TrendingUp" className="lucide-sm" />
                                            {totalIncome.toFixed(0)}
                                        </div>
                                    </div>
                                    <div className="stat-item">
                                        <div style={{ fontSize: '11px', color: 'var(--dgray)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Ieșiri (RON)</div>
                                        <div className="stat-value red">
                                            <Icon name="TrendingDown" className="lucide-sm" />
                                            {totalExpenses.toFixed(0)}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="section-title">Ajustează Venitul</div>
                            <div className="card">
                                <input
                                    type="number"
                                    placeholder="Scrie venitul tău (RON)..."
                                    value={income}
                                    onChange={(e) => handleIncomeChange(e.target.value)}
                                    style={{ fontSize: '20px', fontWeight: '700', fontFamily: 'var(--font-mono)' }}
                                />
                                <div style={{ display: 'flex', gap: '8px', overflowX: 'auto', marginTop: '12px', paddingBottom: '8px' }}>
                                    {BUDGET_TEMPLATES.map((tpl, i) => (
                                        <button key={i} className="btn-outline" onClick={() => handleIncomeChange(tpl.income)} style={{ whiteSpace: 'nowrap', cursor: 'pointer' }}>
                                            {tpl.name}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="section-title">Activitate Recentă <button className="btn-outline" style={{ padding: '4px 10px', fontSize: '11px' }} onClick={() => setActiveTab('history')}>Vezi Tot</button></div>
                            {expenses.length === 0 ? (
                                <div style={{ textAlign: 'center', padding: '30px 20px', color: 'var(--dgray)' }}>
                                    <Icon name="Ghost" className="lucide-lg" style={{ opacity: 0.5, marginBottom: '10px' }} />
                                    <p style={{ fontSize: '14px' }}>Nicio plată înregistrată luna aceasta.</p>
                                </div>
                            ) : (
                                <div>
                                    {expenses.slice(0, 4).map(e => {
                                        const cat = CATEGORIES_DEFAULT.find(c => c.id === e.categoryId) || CATEGORIES_DEFAULT[CATEGORIES_DEFAULT.length - 1];
                                        return (
                                            <div key={e.id} className="list-item">
                                                <div className="item-icon"><Icon name={cat.icon} /></div>
                                                <div className="item-details">
                                                    <div className="item-title">{e.name}</div>
                                                    <div className="item-subtitle">{cat.name}</div>
                                                </div>
                                                <div className="item-amount">-{e.amount} <span style={{ fontSize: '12px', color: 'var(--gray)' }}>RON</span></div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'history' && (
                        <div className="content-section">
                            <div className="section-title">Istoric Plăți</div>
                            {expenses.length === 0 && <p style={{ color: 'var(--gray)' }}>Fără plăți.</p>}
                            {expenses.map(e => {
                                const cat = CATEGORIES_DEFAULT.find(c => c.id === e.categoryId) || CATEGORIES_DEFAULT[CATEGORIES_DEFAULT.length - 1];
                                return (
                                    <div key={e.id} className="list-item">
                                        <div className="item-icon"><Icon name={cat.icon} /></div>
                                        <div className="item-details">
                                            <div className="item-title">{e.name}</div>
                                            <div className="item-subtitle">{new Date(e.date).toLocaleDateString('ro-RO')} • {cat.name}</div>
                                        </div>
                                        <div style={{ textAlign: 'right' }}>
                                            <div className="item-amount">-{e.amount} RON</div>
                                            <span onClick={() => deleteExpense(e.id)} style={{ color: 'var(--danger)', fontSize: '12px', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: '4px', marginTop: '4px' }}>
                                                <Icon name="Trash2" className="lucide-sm" />Șterge
                                            </span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {activeTab === 'analytics' && (
                        <div className="content-section">

                            {/* "Cât pot cheltui pe zi" Assistant Tool */}
                            <div className="section-title">Asistent Siguranță</div>
                            {isCurrentMonth ? (
                                <div className={`daily-intel ${remaining <= 0 ? 'intel-danger' : ''}`}>
                                    <div className="intel-icon">
                                        <Icon name={remaining <= 0 ? "Frown" : "CalendarHeart"} className="lucide-lg" />
                                    </div>
                                    <div className="intel-text">
                                        <h4>Buget zilnic recomandat</h4>
                                        {remaining > 0 ? (
                                            <p><span className="amount">{allowancePerDay} RON</span> / zi</p>
                                        ) : (
                                            <p style={{ fontSize: '14px', color: 'var(--danger)', fontWeight: '600' }}>Ai depășit bugetul. Taie din cheltuieli!</p>
                                        )}
                                        <p style={{ fontSize: '11px', marginTop: '4px', opacity: 0.8 }}>{daysLeft} zile rămase în luna curentă.</p>
                                    </div>
                                </div>
                            ) : (
                                <p style={{ color: 'var(--gray)', fontSize: '14px', marginBottom: '20px' }}>Asistentul funcționează doar pentru luna în curs.</p>
                            )}

                            <div className="section-title">Unde se duc banii tăi?</div>
                            <div className="card">
                                {expenses.length > 0 ? (
                                    <div className="chart-container" style={{ height: '220px' }}>
                                        <canvas ref={chartRef}></canvas>
                                    </div>
                                ) : (
                                    <p style={{ color: 'var(--gray)', textAlign: 'center', padding: '20px' }}>Nu există cheltuieli înregistrate pentru a afișa graficul.</p>
                                )}
                            </div>
                        </div>
                    )}

                    {activeTab === 'settings' && (
                        <div className="content-section">
                            <div className="section-title">Instrucțiuni & Sfaturi</div>
                            <div className="card" style={{ padding: '10px', background: 'transparent', border: 'none', paddingLeft: 0, paddingRight: 0 }}>

                                <div className="help-card">
                                    <div className="help-header" onClick={() => toggleHelp(0)}>
                                        1. Cum adaugi bani la venit?
                                        <Icon name={openHelpIndex === 0 ? "ChevronUp" : "ChevronDown"} className="lucide-sm" />
                                    </div>
                                    <div className={`help-body ${openHelpIndex === 0 ? 'open' : ''}`}>
                                        Mergi pe pagina "Acasă". Sub balanță, găsești secțiunea <strong>"Ajustează Venitul"</strong>. Scrie salariul tău net curent în casuța principală, sau alege un șablon rapid (ex. "Salariul Mediu"). Totul se salvează automat!
                                    </div>
                                </div>

                                <div className="help-card">
                                    <div className="help-header" onClick={() => toggleHelp(1)}>
                                        2. Cum se adaugă o cheltuială?
                                        <Icon name={openHelpIndex === 1 ? "ChevronUp" : "ChevronDown"} className="lucide-sm" />
                                    </div>
                                    <div className={`help-body ${openHelpIndex === 1 ? 'open' : ''}`}>
                                        Apasă oricând pe <strong style={{ color: 'var(--gold)' }}>Butonul Auriu cu "Plus"</strong> din partea de jos a ecranului. Introduci suma scriind direct mare (ex. 150), scrii pentru ce ai dat banii (ex. "Mega Image") și alegi categoria potrivită. Aceasta va scădea progresiv din balanța ta principală.
                                    </div>
                                </div>

                                <div className="help-card">
                                    <div className="help-header" onClick={() => toggleHelp(2)}>
                                        3. Regula faimoasă 50/30/20
                                        <Icon name={openHelpIndex === 2 ? "ChevronUp" : "ChevronDown"} className="lucide-sm" />
                                    </div>
                                    <div className={`help-body ${openHelpIndex === 2 ? 'open' : ''}`}>
                                        Încearcă să îți împarți cheltuielile lunare astfel: <br />
                                        <span style={{ color: 'var(--info)' }}>• <strong>50%</strong></span> pentru <strong>Necesități curbe</strong> (Chirie, Utilități, Mâncare, Medicamente)<br />
                                        <span style={{ color: 'var(--warning)' }}>• <strong>30%</strong></span> pentru <strong>Dorințe & Răsfăț</strong> (Abonamente Netflix, Haine, Ieșiri)<br />
                                        <span style={{ color: 'var(--emerald)' }}>• <strong>20%</strong></span> pentru <strong>Economii</strong> (Investiții, Fond de Urgență).<br />
                                        Aplicația îți arată prin Bara de Progres colorată (Verde ➜ Portocaliu ➜ Roșu) cât de aproape ești de a depăși zona sigură a salariului!
                                    </div>
                                </div>

                                <div className="help-card">
                                    <div className="help-header" onClick={() => toggleHelp(3)}>
                                        4. La ce mă ajută Asistentul Siguranță?
                                        <Icon name={openHelpIndex === 3 ? "ChevronUp" : "ChevronDown"} className="lucide-sm" />
                                    </div>
                                    <div className={`help-body ${openHelpIndex === 3 ? 'open' : ''}`}>
                                        În Tab-ul <strong style={{ color: 'var(--white)' }}><Icon name="PieChart" className="lucide-sm" style={{ marginRight: '4px', verticalAlign: 'middle' }} />Analiză</strong>, Asistentul împarte banii tăi rămași matematic la **zilele rămase din luna curentă**. Îți arată **Plafonul de Cheltuieli Zilnic**. Dacă nu depășești acea sumă într-o zi (ex: max 40 RON azi), ești 100% sigur că nu o să rămâi fără bani la sfârșitul lunii!
                                    </div>
                                </div>
                            </div>

                            <div className="section-title" style={{ marginTop: '30px' }}>Gestiune Date Locale</div>
                            <div className="card">
                                <p style={{ fontSize: '13px', color: 'var(--dgray)', marginBottom: '16px' }}>Datele financiare sunt păstrate 100% Offline în memoria internă a telefonului tău (localStorage). Nu ai cont, nu ai parolă, nu le putem vedea pe server. Privacidade Maximă.</p>
                                <button className="btn btn-secondary" style={{ color: 'var(--danger)', borderColor: 'rgba(255, 77, 77, 0.3)' }} onClick={() => {
                                    if (confirm('Atenție: Ștergi definitiv tot istoricul financiar salvat de pe acest telefon? Această acțiune este ireversibilă!')) {
                                        try { window.localStorage.removeItem('IAI_Planner_V2'); } catch (e) { }
                                        window.location.reload();
                                    }
                                }}>
                                    <Icon name="Trash" className="lucide-sm" /> Șterge Tot Istoricul Meu
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Navigation Bar */}
                    <div className="bottom-nav">
                        <div className={`nav-item ${activeTab === 'home' ? 'active' : ''}`} onClick={() => setActiveTab('home')}>
                            <Icon name="LayoutDashboard" />
                            <span className="nav-label">Acasă</span>
                        </div>
                        <div className={`nav-item ${activeTab === 'history' ? 'active' : ''}`} onClick={() => setActiveTab('history')}>
                            <Icon name="ListOrdered" />
                            <span className="nav-label">Istoric</span>
                        </div>

                        <div style={{ width: '60px' }}></div>

                        <div className={`nav-item ${activeTab === 'analytics' ? 'active' : ''}`} onClick={() => setActiveTab('analytics')}>
                            <Icon name="PieChart" />
                            <span className="nav-label">Analiză</span>
                        </div>
                        <div className={`nav-item ${activeTab === 'settings' ? 'active' : ''}`} onClick={() => setActiveTab('settings')}>
                            <Icon name="Settings" />
                            <span className="nav-label">Ajutor</span>
                        </div>

                        {/* Add FAB Icon */}
                        <div className="fab" onClick={() => setIsAddModalOpen(true)}>
                            <Icon name="Plus" style={{ width: '32px', height: '32px' }} />
                        </div>
                    </div>

                    {/* Add Transaction Modal Overlay */}
                    {isAddModalOpen && (
                        <div className="modal-overlay" onClick={(e) => { if (e.target.className === 'modal-overlay') setIsAddModalOpen(false) }}>
                            <div className="modal-sheet">
                                <div className="modal-header">
                                    <h2 style={{ fontSize: '20px' }}>Suma Cheltuită</h2>
                                    <button className="close-btn" onClick={() => setIsAddModalOpen(false)}>
                                        <Icon name="X" />
                                    </button>
                                </div>

                                <form onSubmit={handleAddExpense}>
                                    <div className="form-group" style={{ position: 'relative' }}>
                                        <input
                                            type="number"
                                            step="0.01"
                                            placeholder="0.00"
                                            value={newExpenseAmount}
                                            onChange={e => setNewExpenseAmount(e.target.value)}
                                            required
                                            style={{ fontSize: '32px', fontWeight: '800', fontFamily: 'var(--font-mono)', paddingLeft: '50px' }}
                                            autoFocus
                                        />
                                        <span style={{ position: 'absolute', left: '16px', top: '16px', fontSize: '24px', color: 'var(--dgray)', fontWeight: '700', fontFamily: 'var(--font-mono)' }}>-</span>
                                    </div>

                                    <div className="form-group">
                                        <label>Ce ai cumpărat?</label>
                                        <input
                                            type="text"
                                            placeholder="Ex: Factură EON, Mega Image..."
                                            value={newExpenseName}
                                            onChange={e => setNewExpenseName(e.target.value)}
                                            required
                                        />
                                    </div>

                                    <div className="form-group">
                                        <label>Categorie</label>
                                        <div style={{ position: 'relative' }}>
                                            <select value={newExpenseCat} onChange={e => setNewExpenseCat(e.target.value)}>
                                                {CATEGORIES_DEFAULT.map(c => (
                                                    <option key={c.id} value={c.id}>{c.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    <button type="submit" className="btn btn-primary" style={{ marginTop: '20px' }}>
                                        Adaugă Plată <Icon name="Check" className="lucide-sm" />
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error("React Error Caught:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '40px 20px', textAlign: 'center', color: 'white', fontFamily: 'sans-serif', height: '100vh', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center' }}>
                            <div style={{ fontSize: '48px', fontWeight: 'bold', color: '#ff4d4d', marginBottom: '20px' }}>Eroare Interfață</div>
                            <h2 style={{ marginBottom: '10px' }}>A apărut o eroare neașteptată pe acest dispozitiv.</h2>
                            <p style={{ color: '#BDC3C7', fontSize: '14px', maxWidth: '320px', marginTop: '10px', background: 'rgba(0,0,0,0.5)', padding: '15px', borderRadius: '8px', fontFamily: 'monospace', textAlign: 'left', wordBreak: 'break-all' }}>
                                {this.state.error?.toString()}
                            </p>
                            <button onClick={() => window.location.reload()} style={{ marginTop: '30px', background: '#F39C12', color: 'black', border: 'none', padding: '12px 24px', borderRadius: '50px', fontWeight: 'bold', fontSize: '16px' }}>Reîncarcă Aplicația</button>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>

</html>
