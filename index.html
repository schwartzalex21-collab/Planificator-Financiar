    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            /* Brand Colors from style.css */
            --midnight: #0A1931;
            --midnight2: #0d2040;
            --anthracite: #2D3436;
            --forest: #1B4332;
            --emerald: #2ECC71;
            --gold: #F39C12;
            --gold-dim: #c47d0a;
            --white: #FFFFFF;
            --gray: #BDC3C7;
            --dgray: #636E72;
            --bg: #080f1e;
            --bg2: #0d1829;
            --card-bg: #0f1e35;
            --border: rgba(243, 156, 18, 0.15);
            --border-dim: rgba(255, 255, 255, 0.07);

            /* Action Colors */
            --danger: #ff4d4d;
            --warning: #ffb84d;
            --info: #4da6ff;

            /* Visuals */
            --glass-bg: rgba(8, 15, 30, 0.85);
            --blur: blur(16px);
            --font-head: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 12px;
            --radius-lg: 20px;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--white);
            min-height: 100vh;
            line-height: 1.65;
            overflow-x: hidden;
            padding-bottom: 90px;
            /* Space for bottom nav */
            /* Add delicate background grid pattern */
            background-image:
                linear-gradient(rgba(243, 156, 18, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(243, 156, 18, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: var(--font-head);
        }

        .lucide {
            width: 24px;
            height: 24px;
            stroke-width: 2;
            flex-shrink: 0;
        }

        .lucide-sm {
            width: 18px;
            height: 18px;
        }

        .lucide-lg {
            width: 32px;
            height: 32px;
            stroke-width: 1.5;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top, 0px));
            position: relative;
            min-height: 100vh;
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-dim);
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {

<body>
    <div id="root">
        <div
            style="padding: 40px 20px; text-align: center; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <div style="font-size: 48px; font-weight: bold; color: #F39C12; margin-bottom: 20px;">IAI</div>

            <p style="color: #636E72; font-size: 14px; max-width: 320px; margin-top: 10px;">
                Dacă ecranul nu pornește, asigură-te că ai o conexiune activă la internet.
                <br><br>
                <strong style="color: #F39C12;">Notă pe Mobil (iPhone/Android):</strong> Nu deschide fișierul din
                WhatsApp sau din secțiunea "Fișiere". Te rugăm să-l deschizi direct în <b>Safari</b> sau <b>Chrome</b>.
            </p>
        </div>

    <script>
        window.addEventListener('error', function (event) {
            var root = document.getElementById('root');
            if (root && root.innerHTML.indexOf('Aplicația se încarcă') > -1) {
                root.innerHTML = '<div style="padding: 40px; color: white; text-align: center; font-family: sans-serif;"><h2 style="color: #ff4d4d; margin-bottom: 20px;">Eroare Critică</h2><p>' + (event.message || 'JavaScript Error') + '</p><p style="margin-top:20px; font-size: 14px; color: #F39C12;">Te rugăm să deschizi aplicația direct din browserul tău web (Safari/Chrome).</p></div>';
            }
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Icon Component wrapping Lucide
        const Icon = ({ name, className = "lucide", style = {} }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    // Create icon node based on name
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        iconRef.current.innerHTML = '';
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '24');
                        svg.setAttribute('height', '24');
                        svg.setAttribute('viewBox', '0 0 24 24');
                        svg.setAttribute('fill', 'none');
                        svg.setAttribute('stroke', 'currentColor');
                        svg.setAttribute('stroke-width', '2');
                        svg.setAttribute('stroke-linecap', 'round');
                        svg.setAttribute('stroke-linejoin', 'round');
                        svg.setAttribute('class', className);

                        if (Array.isArray(iconData)) {
                            iconData.forEach(child => {
                                if (Array.isArray(child) && child.length >= 2) {
                                    const el = document.createElementNS('http://www.w3.org/2000/svg', child[0]);
                                    const attrs = child[1];
                                    if (typeof attrs === 'object' && attrs !== null) {
                                        Object.keys(attrs).forEach(attr => el.setAttribute(attr, attrs[attr]));
                                    }
                                    svg.appendChild(el);
                                }
                            });
                        }
                        iconRef.current.appendChild(svg);
                    }
                }
            }, [name, className]);

            return <i ref={iconRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', ...style }}></i>;
        };

        // Categorii Premium
        const CATEGORIES_DEFAULT = [
            { id: 'supermarket', icon: 'ShoppingCart', name: 'Supermarket & Alimente' },
            { id: 'utilitati', icon: 'Lightbulb', name: 'Facturi & Utilități' },
            { id: 'chirie', icon: 'Home', name: 'Chirie & Rate' },
            { id: 'transport', icon: 'Car', name: 'Transport & Auto' },
            { id: 'sanatate', icon: 'HeartPulse', name: 'Sănătate & Farmacie' },
            { id: 'haine', icon: 'Shirt', name: 'Haine & Shopping' },
            { id: 'restaurant', icon: 'Utensils', name: 'Restaurant & Ieșiri' },
            { id: 'educatie', icon: 'GraduationCap', name: 'Educație & Cursuri' },
            { id: 'vacante', icon: 'Plane', name: 'Vacanțe & Timp Liber' },
            { id: 'copii', icon: 'Baby', name: 'Copii & Familie' },
            { id: 'economii', icon: 'PiggyBank', name: 'Economii & Investiții' },
            { id: 'altele', name: 'Altele', icon: 'MoreHorizontal', color: '#95A5A6' },
            { id: 'factura_recurenta', name: 'Factură/Rată', icon: 'Repeat', color: '#8E44AD' }
        ];

        // Bugete specifice pieței din România
        const BUDGET_TEMPLATES = [
            { name: 'Salariul Minim', income: 2400 },
            { name: 'Salariul Mediu', income: 5000 },
            { name: 'Profesionist', income: 8000 },
            { name: 'Expert / IT', income: 15000 }
        ];

        const QUOTES = [
            "Fiecare leu economisit azi e o secundă de libertate câștigată pentru mâine.",
            "Bogația nu constă în câți bani faci, ci în câți bani păstrezi.",
            "Fă ca banii tăi să muncească pentru tine, altfel tu vei munci pentru ei.",
            "Un buget îți spune unde să meargă banii tăi, în loc să te întrebi unde s-au dus.",
            "Cea mai mare bogăție este lipsa datoriilor și pacea minții."
        ];

        function App() {
            // Core State
            const [activeTab, setActiveTab] = useState('home');
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [currentMonth, setCurrentMonth] = useState(new Date());

            // Data State
            const [income, setIncome] = useState('');
            const [expenses, setExpenses] = useState([]);
            const [subs, setSubs] = useState([]); // Subscriptions
            const [dataStore, setDataStore] = useState({});

            // Features
            const [dailyQuote, setDailyQuote] = useState('');
            const [toast, setToast] = useState(null);
            const [openHelpIndex, setOpenHelpIndex] = useState(null);
            const [isAddSubOpen, setIsAddSubOpen] = useState(false);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const fileInputRef = useRef(null);

            // Cycle & Calendar
            const [payday, setPayday] = useState(1);
            const [selectedDate, setSelectedDate] = useState(new Date());

            // Security & Privacy
            const [savedPin, setSavedPin] = useState(null);
            const [isLocked, setIsLocked] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [isSettingPin, setIsSettingPin] = useState(false);
            const [tempPin, setTempPin] = useState('');
            const [isBlurred, setIsBlurred] = useState(false);

            // Notifications Note: HTML5 Notifications API require HTTPS and explicit user permissions. 
            // Since this runs offline, push notifications aren't natively reliable without a registered ServiceWorker.
            // We explain this limitation gracefully in settings.

            const getMonthKey = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
            const formatMonthInfo = (date) => {
                const months = ['Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie', 'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'];
                return `${months[date.getMonth()]} ${date.getFullYear()}`;
            };

            const showToast = (message, type = 'info') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3500);
            };

            // Initialization
            useEffect(() => {
                // Set daily quote
                setDailyQuote(QUOTES[Math.floor(Math.random() * QUOTES.length)]);

                // Security Init & Privacy Blur
                const storedPin = window.localStorage ? window.localStorage.getItem('IAI_Planner_PIN') : null;
                if (storedPin) {
                    setSavedPin(storedPin);
                    setIsLocked(true);
                }

                const storedPayday = window.localStorage ? window.localStorage.getItem('IAI_Planner_Payday') : null;
                if (storedPayday) setPayday(parseInt(storedPayday));

                const handleVisibilityChange = () => {
                    if (document.hidden) {
                        setIsBlurred(true);
                        // Optional: if backgrounded for more than X mins, re-lock app (setIsLocked(true) if savedPin).
                    } else {
                        setIsBlurred(false);
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                // Load local storage
                try {
                    const saved = window.localStorage ? window.localStorage.getItem('IAI_Planner_V2') : null;
                    if (saved) {
                        try {
                            const parsed = JSON.parse(saved);
                            setDataStore(parsed.dataStore || {});
                            if (parsed.subs) setSubs(parsed.subs);
                        } catch (e) {
                            console.error('Error loading data', e);
                        }
                    }
                } catch (e) {
                    console.error('LocalStorage unavailable', e);
                }

                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, []);

            // Month Data Load
            useEffect(() => {
                const mKey = getMonthKey(currentMonth);
                const monthData = dataStore[mKey] || { income: '', expenses: [] };
                setIncome(monthData.income || '');
                setExpenses(monthData.expenses || []);
            }, [currentMonth, dataStore]);

            const getCycleBounds = (date, pDay) => {
                const d = new Date(date);
                d.setHours(0, 0, 0, 0);
                let start = new Date(d.getFullYear(), d.getMonth(), pDay);
                if (d.getDate() < pDay) {
                    start = new Date(d.getFullYear(), d.getMonth() - 1, pDay);
                }
                const end = new Date(start.getFullYear(), start.getMonth() + 1, pDay - 1);
                end.setHours(23, 59, 59, 999);
                return { start, end };
            };

            const saveState = (inc, exps) => {
                const mKey = getMonthKey(currentMonth);
                const newDataStore = { ...dataStore, [mKey]: { income: inc, expenses: exps } };
                setDataStore(newDataStore);
                try {
                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        const parsed = existingSaved ? JSON.parse(existingSaved) : { subs: [] };
                        parsed.dataStore = newDataStore;
                        window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(parsed));
                    }
                } catch (e) {
                    console.error('LocalStorage save failed', e);
                }
            };

            const saveSubs = (newSubs) => {
                setSubs(newSubs);
                try {
                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        const parsed = existingSaved ? JSON.parse(existingSaved) : { dataStore: {} };
                        parsed.subs = newSubs;
                        window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(parsed));
                    }
                } catch (e) {
                    console.error('LocalStorage subs save failed', e);
                }
            };

            // Forms handling
            const [newExpenseName, setNewExpenseName] = useState('');
            const [newExpenseAmount, setNewExpenseAmount] = useState('');
            const [newExpenseCat, setNewExpenseCat] = useState('supermarket');
            const [newExpenseDate, setNewExpenseDate] = useState(''); // Allows past days

            // --- SMART AUTOCOMPLETE ---
            useEffect(() => {
                if (newExpenseName.trim().length > 2) {
                    const searchName = newExpenseName.trim().toLowerCase();
                    // Căutare în istoricul global
                    let foundCat = null;
                    Object.values(dataStore).forEach(monthData => {
                        const exps = monthData.expenses || [];
                        const match = exps.find(e => e.name.toLowerCase() === searchName);
                        if (match && !foundCat) {
                            foundCat = match.categoryId;
                        }
                    });
                    if (foundCat) {
                        setNewExpenseCat(foundCat);
                    }
                }
            }, [newExpenseName, dataStore]);

            // --- AUTO-LOGGING RECURENȚE ---
            useEffect(() => {
                const mKey = getMonthKey(currentMonth);
                const monthData = dataStore[mKey];

                // Trage la început de lună automat dacă există venit setat și recurențe active
                if (monthData && monthData.income && subs.length > 0 && !monthData.subsAdded) {
                    let newExps = [...(monthData.expenses || [])];
                    let addedAny = false;

                    subs.forEach(sub => {
                        const alreadyExists = newExps.some(e => e.name === sub.name && e.amount === sub.amount);
                        if (!alreadyExists) {
                            newExps.push({
                                id: Date.now() + Math.random(), // Unique ID
                                name: sub.name,
                                amount: parseFloat(sub.amount),
                                categoryId: 'factura_recurenta', // Specific internal tag or just 'altele'
                                date: new Date().toISOString(),
                                isAuto: true
                            });
                            addedAny = true;
                        }
                    });

                    newExps.sort((a, b) => new Date(b.date) - new Date(a.date));

                    // Marhează luna asta ca având recurențele aplicate
                    const newDataStore = { ...dataStore, [mKey]: { ...monthData, expenses: newExps, subsAdded: true } };
                    setDataStore(newDataStore);
                    setExpenses(newExps);

                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        if (existingSaved) {
                            const parsed = JSON.parse(existingSaved);
                            parsed.dataStore = newDataStore;
                            window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(parsed));
                        }
                    }

                    if (addedAny) {
                        setTimeout(() => showToast('Costurile fixe pe luna asta au fost extrase automat!', 'info'), 1500);
                    }
                }
            }, [currentMonth, dataStore, subs]);

            const handleIncomeChange = (val) => {
                setIncome(val);
                saveState(val, expenses);
            };

            const handleAddExpense = (e) => {
                e.preventDefault();
                if (!newExpenseName || !newExpenseAmount) {
                    showToast('Completează ambele câmpuri!', 'warning');
                    return;
                }

                const amount = parseFloat(newExpenseAmount);
                const activeDateString = newExpenseDate ? new Date(newExpenseDate).toISOString() : new Date().toISOString();

                const expenseItem = {
                    id: Date.now(),
                    name: newExpenseName,
                    amount: amount,
                    categoryId: newExpenseCat,
                    date: activeDateString,
                    isManualDate: !!newExpenseDate
                };

                const targetMKey = getMonthKey(new Date(activeDateString));

                if (targetMKey === getMonthKey(currentMonth)) {
                    const updatedList = [expenseItem, ...expenses];
                    setExpenses(updatedList);
                    saveState(income, updatedList);
                } else {
                    const targetMonthData = dataStore[targetMKey] || { income: '', expenses: [] };
                    const updatedTargetExps = [expenseItem, ...(targetMonthData.expenses || [])];
                    const newDataStore = { ...dataStore, [targetMKey]: { ...targetMonthData, expenses: updatedTargetExps } };
                    setDataStore(newDataStore);
                    if (window.localStorage) {
                        const existingSaved = window.localStorage.getItem('IAI_Planner_V2');
                        const parsed = existingSaved ? JSON.parse(existingSaved) : { subs: [], dataStore: {} }; // Ensure dataStore exists
                        parsed.dataStore = newDataStore;
                        window.localStorage.setItem('IAI_Planner_V2', JSON.stringify(parsed));
                    }
                }

                setNewExpenseName('');
                setNewExpenseAmount('');
                setNewExpenseCat('supermarket');
                setNewExpenseDate('');
                setIsAddModalOpen(false);
                showToast('Pagina a salvat detaliile cu succes!', 'success');
            };

            const [newSubName, setNewSubName] = useState('');
            const [newSubAmount, setNewSubAmount] = useState('');

            const handleAddSub = (e) => {
                e.preventDefault();
                if (!newSubName || !newSubAmount) return;

                const amount = parseFloat(newSubAmount);
                const subItem = {
                    id: Date.now(),
                    name: newSubName,
                    amount: amount
                };

                const updatedList = [...subs, subItem];
                saveSubs(updatedList);

                setNewSubName('');
                setNewSubAmount('');
                setIsAddSubOpen(false);
                showToast('Abonament setat cu succes!', 'success');
            };

            const deleteExpense = (id) => {
                const updatedList = expenses.filter(e => e.id !== id);
                setExpenses(updatedList);
                saveState(income, updatedList);
                showToast('Cheltuială ștearsă!', 'info');
            };

            // Math Logic
            const totalIncome = parseFloat(income || 0);
            const totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
            const remaining = totalIncome - totalExpenses;
            let spendPercentage = 0;
            if (totalIncome > 0) {
                spendPercentage = Math.min((totalExpenses / totalIncome) * 100, 100);
            }

            // Health Logic
            let healthStatus = { msg: "Balanță Zen", class: "status-safe", fill: "fill-safe", icon: "Smile" };
            if (spendPercentage >= 90) {
                healthStatus = { msg: "Critic", class: "status-danger", fill: "fill-danger", icon: "AlertTriangle" };
            } else if (spendPercentage >= 75) {
                healthStatus = { msg: "Atenție", class: "status-warn", fill: "fill-warn", icon: "AlertCircle" };
            }

            // Daily Allowance Intel Engine
            const today = new Date();
            const isCurrentMonth = currentMonth.getMonth() === today.getMonth() && currentMonth.getFullYear() === today.getFullYear();

            const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate();
            const daysPassed = isCurrentMonth ? today.getDate() : daysInMonth;
            const daysLeft = isCurrentMonth ? (daysInMonth - daysPassed + 1) : 0;

            const allowancePerDay = daysLeft > 0 && remaining > 0 ? (remaining / daysLeft).toFixed(0) : 0;

            // Financial Allocator (50/30/20)
            const needsCat = ['supermarket', 'utilitati', 'chirie', 'transport', 'sanatate', 'educatie', 'copii'];
            const wantsCat = ['haine', 'restaurant', 'vacante', 'vicii', 'altele'];
            const savingsCat = ['economii'];

            const spentNeeds = expenses.filter(e => needsCat.includes(e.categoryId)).reduce((sum, e) => sum + e.amount, 0);
            const spentWants = expenses.filter(e => wantsCat.includes(e.categoryId)).reduce((sum, e) => sum + e.amount, 0);
            const spentSavings = expenses.filter(e => savingsCat.includes(e.categoryId)).reduce((sum, e) => sum + e.amount, 0);

            const targetNeeds = totalIncome * 0.50;
            const targetWants = totalIncome * 0.30;
            const targetSavings = totalIncome * 0.20;

            const pctNeeds = totalIncome > 0 ? Math.min((spentNeeds / targetNeeds) * 100, 100) : 0;
            const pctWants = totalIncome > 0 ? Math.min((spentWants / targetWants) * 100, 100) : 0;
            const pctSavings = totalIncome > 0 ? Math.min((spentSavings / targetSavings) * 100, 100) : 0;

            // AI Offline Insights Generator
            let aiMessage = "Balanța ta arată bine! Adaugă cheltuieli pentru a primi analize avansate din partea IAI.";
            let aiIcon = "Cpu";
            if (totalIncome > 0 && expenses.length > 0) {
                if (spentNeeds > targetNeeds) {
                    aiMessage = "⚠️ Ai depășit bugetul de bază (50%). Ai grijă la facturi, chirie și cumpărăturile uzuale din supermarket.";
                    aiIcon = "AlertTriangle";
                } else if (spentWants > targetWants) {
                    aiMessage = "💡 Dorințele și ieșirile tale generează costuri peste limita de 30%. IAI îți recomandă moderație săptămâna asta.";
                    aiIcon = "TrendingDown";
                } else if (spentSavings < targetSavings && spentSavings > 0) {
                    aiMessage = "📈 Ai început să economisești, dar încă nu ai atins targetul optim de 20%. Continuă să pui bani deoparte!";
                    aiIcon = "PiggyBank";
                } else if (spentSavings >= targetSavings) {
                    aiMessage = "🏆 Excelent! Te încadrezi perfect în independența financiară. Economiile tale lucrează pentru tine!";
                    aiIcon = "Award";
                } else {
                    aiMessage = "✅ Banii tăi sunt împărțiți excelent luna aceasta. IAI nu a detectat anomalii în comportamentul tău.";
                    aiIcon = "CheckCircle2";
                }
            }

            // Chart rendering
            useEffect(() => {
                if (activeTab === 'analytics' && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    if (chartInstance.current) chartInstance.current.destroy();

                    const byCat = {};
                    expenses.forEach(e => {
                        const c = CATEGORIES_DEFAULT.find(cat => cat.id === e.categoryId);
                        const name = c ? c.name : 'Altele';
                        byCat[name] = (byCat[name] || 0) + e.amount;
                    });

                    const labels = Object.keys(byCat);
                    const data = Object.values(byCat);

                    if (labels.length > 0) {
                        Chart.defaults.color = '#BDC3C7';
                        chartInstance.current = new Chart(ctx, {
                            type: 'doughnut',
                            data: {
                                labels: labels,
                                datasets: [{
                                    data: data,
                                    backgroundColor: ['#F39C12', '#2ECC71', '#3498DB', '#E74C3C', '#9B59B6', '#1ABC9C', '#F1C40F', '#E67E22'],
                                    borderWidth: 0,
                                    hoverOffset: 4
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                cutout: '75%',
                                plugins: { legend: { position: 'right', labels: { font: { family: 'Plus Jakarta Sans', size: 12 } } } }
                            }
                        });
                    }
                }
            }, [activeTab, expenses]);

            const toggleHelp = (index) => {
                setOpenHelpIndex(prevIndex => prevIndex === index ? null : index);
            };

            // --- SECURITY AND DATA BACKUP ACTIONS ---
            const handlePinPress = (digit) => {
                if (pinInput.length < 4) {
                    const newPin = pinInput + digit;
                    setPinInput(newPin);

                    if (newPin.length === 4) {
                        setTimeout(() => {
                            if (isSettingPin) {
                                if (!tempPin) {
                                    setTempPin(newPin);
                                    setPinInput('');
                                    showToast('Confirmă noul cod PIN', 'info');
                                } else {
                                    if (newPin === tempPin) {
                                        window.localStorage.setItem('IAI_Planner_PIN', newPin);
                                        setSavedPin(newPin);
                                        setIsSettingPin(false);
                                        setTempPin('');
                                        setPinInput('');
                                        showToast('Cod PIN securizat cu succes!', 'success');
                                    } else {
                                        showToast('Codurile nu coincid! Încearcă din nou.', 'danger');
                                        setTempPin('');
                                        setPinInput('');
                                    }
                                }
                            } else {
                                if (newPin === savedPin) {
                                    setIsLocked(false);
                                    setPinInput('');
                                } else {
                                    showToast('PIN Incorect!', 'danger');
                                    setPinInput('');
                                }
                            }
                        }, 250);
                    }
                }
            };

            const removePin = () => {
                if (confirm('Sigur vrei să elimini protecția cu cod PIN?')) {
                    window.localStorage.removeItem('IAI_Planner_PIN');
                    setSavedPin(null);
                    showToast('Cod PIN eliminat.', 'info');
                }
            };

            const handleExportJson = () => {
                try {
                    const data = window.localStorage.getItem('IAI_Planner_V2');
                    if (!data) return showToast('Nu există date pentru export.', 'warning');

                    const blob = new Blob([data], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `MoneyPlanner_Backup_${new Date().toISOString().split('T')[0]}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast('Backup salvat cu succes!', 'success');
                } catch (e) {
                    showToast('Eroare la exportul datelor.', 'danger');
                }
            };

            const handleImportJson = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const content = event.target.result;
                        JSON.parse(content); // Validare JSON
                        window.localStorage.setItem('IAI_Planner_V2', content);
                        showToast('Restaurare reușită! Se reîncarcă datele...', 'success');
                        setTimeout(() => window.location.reload(), 1500);
                    } catch (err) {
                        showToast('Fișier invalid sau corupt!', 'danger');
                    }
                };
                reader.readAsText(file);
                // Reset file input
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            // PIN screen override
            if (isLocked || isSettingPin) {
                return (
                    <div className="pin-screen">
                        {toast && <div className={`toast toast-${toast.type}`} style={{ top: '40px' }}>{toast.message}</div>}
                        <Icon name={isSettingPin ? "ShieldPlus" : "Lock"} className="lucide-xl" style={{ color: 'var(--gold)', marginBottom: '24px', width: '48px', height: '48px' }} />
                        <h2 style={{ color: 'var(--white)', fontSize: '24px', fontWeight: 'bold' }}>Money Planner</h2>
                        <p style={{ color: 'var(--gray)', marginTop: '8px' }}>
                            {isSettingPin ? (tempPin ? 'Confirmă noul PIN' : 'Crează un cod PIN de 4 cifre') : 'Introduceți codul PIN de siguranță'}
                        </p>

                        <div className="pin-dots">
                            {[0, 1, 2, 3].map(i => (
                                <div key={i} className={`pin-dot ${pinInput.length > i ? 'filled' : ''}`}></div>
                            ))}
                        </div>

                        <div className="pin-pad">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                                <button key={num} className="pin-btn" onClick={() => handlePinPress(num.toString())}>{num}</button>
                            ))}
                            {isSettingPin ? (
                                <button className="pin-btn action-btn" onClick={() => { setIsSettingPin(false); setPinInput(''); setTempPin(''); }}>Anul.<br />Setare</button>
                            ) : <div></div>}
                            <button className="pin-btn" onClick={() => handlePinPress('0')}>0</button>
                            <button className="pin-btn action-btn" onClick={() => setPinInput(pinInput.slice(0, -1))}><Icon name="Delete" /></button>
                        </div>
                    </div>
                );
            }

            // CALENDAR VARS
            const { start: cycleStart, end: cycleEnd } = getCycleBounds(selectedDate, payday);
            const mKey1 = getMonthKey(cycleStart);
            const mKey2 = getMonthKey(cycleEnd);

            let cycleExps = [];
            if (dataStore[mKey1]?.expenses) cycleExps.push(...dataStore[mKey1].expenses);
            if (mKey1 !== mKey2 && dataStore[mKey2]?.expenses) cycleExps.push(...dataStore[mKey2].expenses);
            cycleExps = cycleExps.filter(e => new Date(e.date) >= cycleStart && new Date(e.date) <= cycleEnd);

            const selectedStr = selectedDate.toISOString().split('T')[0];
            const dayExps = cycleExps.filter(e => e.date.startsWith(selectedStr));
            const dayTotal = dayExps.reduce((s, e) => s + e.amount, 0);

            const spentBefore = cycleExps.filter(e => new Date(e.date) >= cycleStart && new Date(e.date) < new Date(selectedDate).setHours(0, 0, 0, 0)).reduce((s, e) => s + e.amount, 0);
            const cycleIncome = parseFloat(dataStore[mKey1]?.income || 0);
            const totalFixed = subs.reduce((s, x) => s + x.amount, 0);
            const budgetAtStartOfDay = cycleIncome - totalFixed - spentBefore;

            const daysLeftInCycle = Math.ceil((cycleEnd - new Date(selectedDate).setHours(0, 0, 0, 0)) / (1000 * 60 * 60 * 24));
            const activeDailyBudget = daysLeftInCycle > 0 && budgetAtStartOfDay > 0 ? (budgetAtStartOfDay / daysLeftInCycle).toFixed(0) : 0;
            const cycleDaysArr = [];

                                        </div>
                                        <div>
                                            <div style={{ color: 'var(--white)', fontWeight: 'bold', fontSize: '15px' }}>Protecție Cod PIN</div>
                                            <div style={{ color: 'var(--gray)', fontSize: '12px', marginTop: '2px' }}>Blochează accesul în aplicație</div>
                                        </div>
                                    </div>
                                    {savedPin ? (
                                        <button className="btn-outline" style={{ color: 'var(--danger)', borderColor: 'var(--danger)' }} onClick={removePin}>Elimină</button>
                                    ) : (
                                        <button className="btn-outline" onClick={() => setIsSettingPin(true)}>Configurează</button>
                                    )}
                                </div>

                                <div style={{ marginBottom: '8px' }}>
                                    <h4 style={{ color: 'var(--white)', fontSize: '14px', marginBottom: '8px' }}>Salvare și Restaurare Date</h4>
                                    <p style={{ fontSize: '13px', color: 'var(--gray)', marginBottom: '16px', lineHeight: '1.4' }}>
                                        Banii și cheltuielile tale nu ajung pe servere. Descarcă periodic o copie de siguranță pentru a o păstra în Cloud (iCloud/Drive) sau dacă îți schimbi telefonul.
                                    </p>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                                        <button className="btn btn-secondary" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }} onClick={handleExportJson}>
                                            <Icon name="DownloadCloud" className="lucide-sm" /> Exportă (.json)
                                        </button>
                                        <button className="btn btn-secondary" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }} onClick={() => fileInputRef.current && fileInputRef.current.click()}>
                                            <Icon name="UploadCloud" className="lucide-sm" /> Importă (.json)
                                        </button>
                                        <input type="file" ref={fileInputRef} style={{ display: 'none' }} accept=".json" onChange={handleImportJson} />
                                    </div>
                                </div>
                            </div>

                            <div className="section-title" style={{ marginTop: '30px' }}>Setări Ciclu Bugetar</div>
                            <div className="card">
                                <label style={{ fontSize: '14px', color: 'var(--white)', fontWeight: 'bold' }}>Ziua ta de Salariu</label>
                                <select value={payday} onChange={(e) => {
                                    const val = parseInt(e.target.value);
                                    setPayday(val);
                                    window.localStorage.setItem('IAI_Planner_Payday', val);
                                    showToast('Ziua de resetare salvată!', 'success');
                                }} style={{ width: '100%', padding: '12px', marginTop: '10px', background: 'var(--bg-dark)', color: 'var(--white)', border: '1px solid var(--border-dim)', borderRadius: '8px' }}>
                                    {[...Array(28)].map((_, i) => <option key={i + 1} value={i + 1}>{i + 1}</option>)}
                                </select>
                                <p style={{ fontSize: '11px', color: 'var(--gray)', marginTop: '8px' }}>Selectează data în care primești banii. Calendarul va re-calcula bugetul tău zilnic luând în calcul zilele dintre salariul luna curentă și cel din luna viitoare.</p>
                            </div>

                            <div className="section-title" style={{ marginTop: '30px' }}>Gestiune Date Locale</div>
                            <div className="card">
                                <p style={{ fontSize: '13px', color: 'var(--dgray)', marginBottom: '16px' }}>Datele financiare sunt păstrate 100% Offline în memoria internă a telefonului tău (localStorage). Nu ai cont, nu ai parolă, nu le putem vedea pe server. Privacidade Maximă.</p>
                                <button className="btn btn-secondary" style={{ color: 'var(--danger)', borderColor: 'rgba(255, 77, 77, 0.3)' }} onClick={() => {
                                    if (confirm('Atenție: Ștergi definitiv tot istoricul financiar salvat de pe acest telefon? Această acțiune este ireversibilă!')) {
                                        try { window.localStorage.removeItem('IAI_Planner_V2'); } catch (e) { }
                                        window.location.reload();
                                    }
                                }}>
                                    <Icon name="Trash" className="lucide-sm" /> Șterge Tot Istoricul Meu
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Navigation Bar */}
                    <div className="bottom-nav">
                        <div className={`nav-item ${activeTab === 'home' ? 'active' : ''}`} onClick={() => setActiveTab('home')}>
                            <Icon name="LayoutDashboard" />
                            <span className="nav-label">Acasă</span>
                        </div>

                        <div className={`nav-item ${activeTab === 'calendar' ? 'active' : ''}`} onClick={() => setActiveTab('calendar')}>
                            <Icon name="CalendarDays" />
                            <span className="nav-label">Calendar</span>
                        </div>

                        <div style={{ width: '60px' }}></div>

                        <div className={`nav-item ${activeTab === 'analytics' ? 'active' : ''}`} onClick={() => setActiveTab('analytics')}>
                            <Icon name="PieChart" />
                            <span className="nav-label">Analiză</span>
                        </div>
                        <div className={`nav-item ${activeTab === 'settings' ? 'active' : ''}`} onClick={() => setActiveTab('settings')}>
                            <Icon name="Settings" />
                            <span className="nav-label">Ajutor</span>
                        </div>

                        {/* Add FAB Icon */}
                        <div className="fab" onClick={() => setIsAddModalOpen(true)}>
                            <Icon name="Plus" style={{ width: '32px', height: '32px' }} />
                        </div>
                    </div>

                    {/* Add Transaction Modal Overlay */}
                    {isAddModalOpen && (
                        <div className="modal-overlay" onClick={(e) => { if (e.target.className === 'modal-overlay') setIsAddModalOpen(false) }}>
                            <div className="modal-sheet">
                                <div className="modal-header">
                                    <h2 style={{ fontSize: '20px' }}>Suma Cheltuită</h2>
                                    <button className="close-btn" onClick={() => setIsAddModalOpen(false)}>
                                        <Icon name="X" />
                                    </button>
                                </div>

                                <form onSubmit={handleAddExpense}>
                                    <div className="form-group" style={{ position: 'relative' }}>
                                        <input
                                            type="number"
                                            step="0.01"
                                            placeholder="0.00"
                                            value={newExpenseAmount}
                                            onChange={e => setNewExpenseAmount(e.target.value)}
                                            required
                                            style={{ fontSize: '32px', fontWeight: '800', fontFamily: 'var(--font-mono)', paddingLeft: '50px' }}
                                            autoFocus
                                        />
                                        <span style={{ position: 'absolute', left: '16px', top: '16px', fontSize: '24px', color: 'var(--dgray)', fontWeight: '700', fontFamily: 'var(--font-mono)' }}>-</span>
                                    </div>

                                    <div className="form-group">
                                        <label>Ce ai cumpărat?</label>
                                        <input
                                            type="text"
                                            placeholder="Ex: Factură EON, Mega Image..."
                                            value={newExpenseName}
                                            onChange={e => setNewExpenseName(e.target.value)}
                                            required
                                        />
                                    </div>

                                    <div className="form-group">
                                        <label>Categorie</label>
                                        <div style={{ position: 'relative' }}>
                                            <select value={newExpenseCat} onChange={e => setNewExpenseCat(e.target.value)}>
                                                {CATEGORIES_DEFAULT.map(c => (
                                                    <option key={c.id} value={c.id}>{c.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    <div className="form-group" style={{ marginTop: '20px' }}>
                                        <label>Modificare Dată (Opțional)</label>
                                        <input type="date" value={newExpenseDate} onChange={e => setNewExpenseDate(e.target.value)} style={{ padding: '12px', background: 'var(--bg-dark)', color: 'var(--gray)', border: '1px solid var(--border-dim)', borderRadius: '8px', width: '100%', fontFamily: 'var(--font-mono)' }} />
                                    </div>

                                    <button type="submit" className="btn btn-primary" style={{ marginTop: '20px' }}>
                                        Adaugă Plată <Icon name="Check" className="lucide-sm" />
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Add Subscription Modal Overlay */}
                    {isAddSubOpen && (
                        <div className="modal-overlay" onClick={(e) => { if (e.target.className === 'modal-overlay') setIsAddSubOpen(false) }}>
                            <div className="modal-sheet">
                                <div className="modal-header">
                                    <h2 style={{ fontSize: '20px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <Icon name="CalendarClock" style={{ color: 'var(--gold)' }} />
                                        Abonament Nou
                                    </h2>
                                    <button className="close-btn" onClick={() => setIsAddSubOpen(false)}>
                                        <Icon name="X" />
                                    </button>
                                </div>

                                <form onSubmit={handleAddSub}>
                                    <div className="form-group" style={{ position: 'relative' }}>
                                        <input
                                            type="number"
                                            step="0.01"
                                            placeholder="0.00"
                                            value={newSubAmount}
                                            onChange={e => setNewSubAmount(e.target.value)}
                                            required
                                            style={{ fontSize: '32px', fontWeight: '800', fontFamily: 'var(--font-mono)' }}
                                            autoFocus
                                        />
                                    </div>

                                    <div className="form-group" style={{ marginTop: '20px' }}>
                                        <label>Nume Factură / Abonament</label>
                                        <input
                                            type="text"
                                            placeholder="Ex: Netflix, Chirie, Rată Bancă..."
                                            value={newSubName}
                                            onChange={e => setNewSubName(e.target.value)}
                                            required
                                        />
                                    </div>

                                    <div className="form-group" style={{ marginTop: '24px' }}>
                                        <button type="submit" className="btn btn-primary" style={{ width: '100%', padding: '18px' }}>
                                            <Icon name="Check" />
                                            Salvează Recurența
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error("React Error Caught:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '40px 20px', textAlign: 'center', color: 'white', fontFamily: 'sans-serif', height: '100vh', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center' }}>
                            <div style={{ fontSize: '48px', fontWeight: 'bold', color: '#ff4d4d', marginBottom: '20px' }}>Eroare Interfață</div>
                            <h2 style={{ marginBottom: '10px' }}>A apărut o eroare neașteptată pe acest dispozitiv.</h2>
                            <p style={{ color: '#BDC3C7', fontSize: '14px', maxWidth: '320px', marginTop: '10px', background: 'rgba(0,0,0,0.5)', padding: '15px', borderRadius: '8px', fontFamily: 'monospace', textAlign: 'left', wordBreak: 'break-all' }}>
                                {this.state.error?.toString()}
                            </p>
                            <button onClick={() => window.location.reload()} style={{ marginTop: '30px', background: '#F39C12', color: 'black', border: 'none', padding: '12px 24px', borderRadius: '50px', fontWeight: 'bold', fontSize: '16px' }}>Reîncarcă Aplicația</button>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>

</html>
