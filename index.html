                                        </button>
                                    </div>

                                    <form onSubmit={handleAddGoal}>
                                        <div className="form-group" style={{ position: 'relative' }}>
                                            <input
                                                type="number"
                                                step="0.01"
                                                min="0.01"
                                                placeholder="Suma Țintă (Ex: 5000)"
                                                value={newGoalAmount}
                                                onChange={e => setNewGoalAmount(e.target.value)}
                                                style={{ fontSize: '32px', fontWeight: '800', fontFamily: 'var(--font-mono)' }}
                                                autoFocus
                                            />
                                        </div>

                                        <div className="form-group" style={{ marginTop: '20px' }}>
                                            <label>Pentru ce strângi bani?</label>
                                            <input
                                                type="text"
                                                placeholder="Ex: Vacanță, Mașină..."
                                                value={newGoalName}
                                                onChange={e => setNewGoalName(e.target.value)}
                                            />
                                        </div>

                                        <div className="form-group" style={{ marginTop: '16px' }}>
                                            <label style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                <Icon name="CalendarClock" style={{ width: '14px', height: '14px', color: 'var(--gold)' }} />
                                                Termen Limită (Opțional)
                                            </label>
                                            <input
                                                type="date"
                                                value={newGoalDate}
                                                onChange={e => setNewGoalDate(e.target.value)}
                                                style={{ padding: '12px', background: 'rgba(255,255,255,0.03)', color: 'var(--gray)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 'var(--radius)', width: '100%', fontFamily: 'var(--font-mono)', fontSize: '15px' }}
                                            />
                                            {newGoalDate && newGoalAmount && (
                                                <p style={{ fontSize: '11px', color: 'var(--emerald)', marginTop: '6px' }}>
                                                    💡 {(() => {
                                                        const days = Math.max(1, Math.ceil((new Date(newGoalDate) - new Date()) / (1000 * 60 * 60 * 24)));
                                                        const daily = (parseFloat(newGoalAmount) / days).toFixed(0);
                                                        return `Trebuie să economisești ~${daily} RON/zi în ${days} zile`;
                                                    })()}
                                                </p>
                                            )}
                                        </div>

                                        <div className="form-group" style={{ marginTop: '20px' }}>
                                            <button type="submit" className="btn-primary" style={{ width: '100%', padding: '16px', background: 'var(--gold)', color: 'var(--bg-dark)', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
                                                <Icon name="Check" className="lucide-sm" />
                                                Setează Obiectivul
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )
                    }

                    {/* Transfer to Goal Modal Overlay */}
                    {
                        isTransferModalOpen && (
                            <div className="modal-overlay" onClick={(e) => { if (e.target.className === 'modal-overlay') setIsTransferModalOpen(false) }}>
                                <div className="modal-sheet">
                                    <div className="modal-header">
                                        <h2 style={{ fontSize: '20px', display: 'flex', alignItems: 'center', gap: '8px', color: 'var(--gold)' }}>
                                            <Icon name="PiggyBank" style={{ color: 'var(--gold)' }} />
                                            Transferă Economiile
                                        </h2>
                                        <button className="close-btn" onClick={() => setIsTransferModalOpen(false)}>
                                            <Icon name="X" />
                                        </button>
                                    </div>

                                    <form onSubmit={handleTransferToGoal}>
                                        <div className="form-group" style={{ position: 'relative' }}>
                                            <input
                                                type="number"
                                                step="1"
                                                min="1"
                                                placeholder="Suma (ex: 100)"
                                                value={transferAmount}
                                                onChange={e => setTransferAmount(e.target.value)}
                                                style={{ fontSize: '32px', fontWeight: '800', fontFamily: 'var(--font-mono)', color: 'var(--gold)' }}
                                            />
                                        </div>
                                        <p style={{ fontSize: '13px', color: 'var(--gray)', marginTop: '-8px', marginBottom: '16px' }}>Mută banii din balanța disponibilă către acest obiectiv.</p>

                                        <div className="form-group">
                                            <label>Spre ce obiectiv transferi?</label>
                                            <select value={selectedGoalId} onChange={e => setSelectedGoalId(e.target.value)} style={{ width: '100%', padding: '14px', borderRadius: '12px', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', color: 'var(--white)', fontSize: '16px', appearance: 'auto' }} required>
                                                <option value="" disabled>Alege...</option>
                                                {goals.map(g => (
                                                    <option key={g.id} value={g.id}>{g.name} ({g.currentSavedAmount.toFixed(0)}/{g.targetAmount})</option>
                                                ))}
                                            </select>
                                        </div>

                                        <div className="form-group" style={{ marginTop: '24px' }}>
                                            <button type="submit" className="btn-primary" style={{ width: '100%', padding: '16px', background: 'var(--gold)', color: '#000', fontWeight: 'bold', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
                                                <Icon name="Check" className="lucide-sm" />
                                                Confirmă Transferul
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )
                    }

                    {/* V2 Premium: User Profile Setup Modal */}
                    {
                        isProfileModalOpen && (
                            <div className="modal-overlay" onClick={(e) => { if (e.target.className === 'modal-overlay') setIsProfileModalOpen(false) }}>
                                <div className="modal-sheet">
                                    <div className="modal-header">
                                        <h2 style={{ fontSize: '20px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                            <Icon name="User" style={{ color: 'var(--gold)' }} /> Setări Profil
                                        </h2>
                                        <button className="close-btn" onClick={() => setIsProfileModalOpen(false)}>
                                            <Icon name="X" />
                                        </button>
                                    </div>
                                    <form onSubmit={handleSaveProfile} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                                        <div style={{ position: 'relative', marginBottom: '24px' }}>
                                            {userProfile.avatar ? (
                                                <img src={userProfile.avatar} alt="Avatar" style={{ width: '80px', height: '80px', borderRadius: '50%', objectFit: 'cover', border: '2px solid var(--gold)', boxShadow: '0 4px 15px rgba(243,156,18,0.3)' }} />
                                            ) : (
                                                <div style={{ width: '80px', height: '80px', borderRadius: '50%', background: 'var(--bg2)', border: '2px dashed var(--gray)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--gray)' }}>
                                                    <Icon name="Camera" />
                                                </div>
                                            )}
                                            <input type="file" accept="image/*" onChange={handleProfileImageUpload} style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', opacity: 0, cursor: 'pointer' }} />
                                        </div>
                                        <div className="form-group" style={{ width: '100%' }}>
                                            <label>Numele tău</label>
                                            <input type="text" value={editProfileName} onChange={e => setEditProfileName(e.target.value)} placeholder="Ex: Alex" required />
                                        </div>
                                        <button type="submit" className="btn-primary" style={{ width: '100%', padding: '16px', background: 'var(--gold)', color: '#000', fontWeight: 'bold' }}>Salvează Profilul</button>
                                    </form>
                                </div>
                            </div>
                        )
                    }

                    {/* V2 Premium: Add/Edit Income Modal */}
                    {
                        isIncomeModalOpen && (
                            <div className="modal-overlay" onClick={(e) => { if (e.target.className === 'modal-overlay') setIsIncomeModalOpen(false) }}>
                                <div className="modal-sheet">
                                    <div className="modal-header">
                                        <h2 style={{ fontSize: '20px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                            <Icon name={newIncomeSource.toLowerCase().includes('salariu') ? "Target" : "Banknote"} style={{ color: 'var(--gold)' }} />
                                            {editIncomeId ? 'Editează Venit' : 'Venit Nou'}
                                        </h2>
                                        <button className="close-btn" onClick={() => setIsIncomeModalOpen(false)}>
                                            <Icon name="X" />
                                        </button>
                                    </div>
                                    <form onSubmit={handleAddIncome}>
                                        <div className="form-group">
                                            <label>Sursă Venit (Ex: Salariu, Comision, Vânzări)</label>
                                            <input type="text" value={newIncomeSource} onChange={e => setNewIncomeSource(e.target.value)} placeholder="Ex: Salariu" required />
                                        </div>
                                        <div className="form-group" style={{ position: 'relative' }}>
                                            <label>Suma (RON)</label>
                                            <input type="number" step="0.01" value={newIncomeAmount} onChange={e => setNewIncomeAmount(e.target.value)} placeholder="0.00" style={{ fontSize: '24px', fontWeight: 'bold', fontFamily: 'var(--font-mono)' }} required />
                                            <span style={{ position: 'absolute', right: '16px', top: '38px', color: 'var(--gray)' }}>RON</span>
                                        </div>
                                        <button type="submit" className="btn-primary" style={{ width: '100%', padding: '16px', background: 'var(--gold)', color: '#000', fontWeight: 'bold', marginTop: '10px' }}>
                                            {editIncomeId ? 'Salvează Modificările' : 'Adaugă Venit'}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )
                    }
                </div>
            );
        }

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error("React Error Caught:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '40px 20px', textAlign: 'center', color: 'white', fontFamily: 'sans-serif', height: '100vh', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center' }}>
                            <div style={{ fontSize: '48px', fontWeight: 'bold', color: '#ff4d4d', marginBottom: '20px' }}>Eroare Interfață</div>
                            <h2 style={{ marginBottom: '10px' }}>A apărut o eroare neașteptată pe acest dispozitiv.</h2>
                            <p style={{ color: '#BDC3C7', fontSize: '14px', maxWidth: '320px', marginTop: '10px', background: 'rgba(0,0,0,0.5)', padding: '15px', borderRadius: '8px', fontFamily: 'monospace', textAlign: 'left', wordBreak: 'break-all' }}>
                                {this.state.error?.toString()}
                            </p>
                            <button onClick={() => window.location.reload()} style={{ marginTop: '30px', background: '#F39C12', color: 'black', border: 'none', padding: '12px 24px', borderRadius: '50px', fontWeight: 'bold', fontSize: '16px' }}>Reîncarcă Aplicația</button>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>

</html>
